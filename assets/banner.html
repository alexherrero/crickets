<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Crickets — README Banner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    /* 1600×430 — matches Agent M banner dims exactly for cross-repo brand consistency.
       (Was 1600×640 with a fake hardcoded status panel; status panel dropped per
       plan #15 task 7 — version/CI/license data lives in the live shields.io
       badges in the README hero, not baked into the banner PNG.) */
    :root {
      --bw: 1600;
      --bh: 430;
      --ink: #000;
      --paper: #f4efe6;     /* brand paper — aligned with badge convention (was #d9d2c4 drift) */
      --line: rgba(255,255,255,0.18);
    }
    html, body { margin: 0; height: 100%; background: #1a1818; display: grid; place-items: center; font-family: 'Inter Tight', system-ui, sans-serif; }
    .stage {
      width: calc(var(--bw) * 1px);
      height: calc(var(--bh) * 1px);
      transform: scale(var(--scale, 1));
      transform-origin: center;
    }
    .banner {
      width: 100%; height: 100%;
      background: var(--ink);
      color: white;
      display: grid;
      grid-template-columns: 640px 1fr;
      grid-template-rows: 100%;     /* bugfix: ensures .copy gets real height so its 1fr 1fr rows distribute */
      overflow: hidden;
      position: relative;
    }

    /* LEFT: figure column */
    .figure {
      position: relative;
      background: var(--ink);
      display: flex; align-items: center; justify-content: center;
      padding: 60px;
      box-sizing: border-box;
    }
    .figure img {
      width: 100%; height: 100%;
      object-fit: contain;
      display: block;
    }
    .figure::after {
      content: '';
      position: absolute; right: 0; top: 0; bottom: 0;
      width: 1px;
      background: rgba(255,255,255,0.08);
    }

    /* RIGHT: stacked panels */
    .copy {
      display: grid;
      grid-template-rows: 1fr 1fr;
      min-width: 0;
    }

    .band-wordmark {
      background: var(--ink);
      padding: 0 56px;
      display: flex; align-items: center;
      border-bottom: 1px solid var(--line);
    }
    .wordmark {
      font-family: 'Inter Tight', system-ui, sans-serif;
      font-weight: 900;
      font-size: 76px;
      line-height: 0.95;
      letter-spacing: -0.025em;
      white-space: nowrap;
    }
    .wordmark .slash { opacity: 0.55; font-weight: 800; margin: 0 0.35em; }
    .wordmark .sub { font-size: 56px; letter-spacing: -0.015em; }

    .band-tagline {
      background: var(--paper);
      color: var(--ink);
      padding: 0 56px;
      display: flex; align-items: center;
    }
    .tagline {
      font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace;
      font-weight: 500;
      font-size: 28px;        /* sized down from 32px to fit single-line tagline at 1600px width */
      line-height: 1.2;
      letter-spacing: -0.01em;
      white-space: nowrap;    /* keep single-line per operator request 2026-05-25 */
    }
  </style>
</head>
<body>
  <div class="stage" id="stage" data-screen-label="Crickets Banner">
    <div class="banner">
      <div class="figure">
        <!-- Disc-on-transparent so the figure floats cleanly on the banner's black -->
        <img src="crickets/crickets-disc-1024.png" alt="Crickets" />
      </div>

      <div class="copy">
        <div class="band-wordmark">
          <div class="wordmark">
            CRICKETS <span class="slash">//</span><span class="sub">NOISY</span>
          </div>
        </div>
        <div class="band-tagline">
          <div class="tagline">[ A LOUD LITTLE TOOLKIT FOR AGENTIC SYSTEMS ]</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Scale banner to fit viewport while preserving aspect ratio.
    // pad=0 means screenshot capture at exact 1600x430 renders at scale 1
    // (no shrinkage); browser preview at larger viewports still scales down to fit.
    const bw = 1600, bh = 430;
    const fit = () => {
      const pad = 0;
      const sx = (window.innerWidth - pad * 2) / bw;
      const sy = (window.innerHeight - pad * 2) / bh;
      document.documentElement.style.setProperty('--scale', Math.min(sx, sy, 1));
    };
    window.addEventListener('resize', fit);
    fit();
  </script>
</body>
</html>
