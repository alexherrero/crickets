name: "[W] Lint Wiki"

# Lints wiki/ against the structural rules (Diátaxis / intent-group, ADR 0018) on
# every push or PR that touches wiki/**. Runs the VENDORED check-wiki.py that
# wiki-init copies into .github/scripts/ from the wiki-maintenance plugin:
# GitHub Actions runners have no ${CLAUDE_PLUGIN_ROOT}, so the gate is vendored,
# not referenced. After a plugin upgrade, re-sync it with `wiki-init --resync-gate`.
# (Agent-invoked check-wiki — during /work, wiki-author — uses the bundled
# ${CLAUDE_PLUGIN_ROOT}/scripts/check-wiki.py directly; no vendoring needed there.)
#
# Dropped by wiki-init as the INITIAL copy — you own it after it lands; edit freely.

on:
  push:
    paths:
      - 'wiki/**'
      - '.github/scripts/check-wiki.py'
  pull_request:
    paths:
      - 'wiki/**'
      - '.github/scripts/check-wiki.py'

permissions:
  contents: read

jobs:
  lint-wiki:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Lint wiki/ structure
        # ubuntu-latest ships python3; check-wiki.py is stdlib-only.
        run: python3 .github/scripts/check-wiki.py --strict --root wiki
