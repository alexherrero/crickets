name: "[W] Update Wiki"

# Lint-then-publish for a repo's wiki — dropped into a repo by `wiki-init` as the
# INITIAL copy. Two jobs in one workflow:
#
#   lint-wiki  — runs the VENDORED check-wiki.py that wiki-init copies into
#                .github/scripts/ (GitHub Actions runners have no
#                ${CLAUDE_PLUGIN_ROOT}, so the gate is vendored, not referenced;
#                re-sync after a plugin upgrade with `wiki-init --resync-gate`).
#                Runs on push AND pull_request, so wiki breakage is caught before
#                it merges.
#   update-wiki — mirrors wiki/ to the GitHub Wiki, but only `needs: lint-wiki`
#                (so a structurally-broken wiki can NEVER publish) and only on the
#                default branch. Runs the VENDORED wiki_publish_transform.py
#                (same vendoring pattern as check-wiki.py, re-synced by the same
#                `--resync-gate`) on the freshly-rsynced checkout, after rsync
#                and before commit, to fix two GitHub-Wiki-only rendering gaps
#                that don't show up in a git checkout: raw YAML frontmatter
#                displaying above the H1, and tree-relative asset links (images,
#                PDFs) 404ing once pages are served at flat wiki URLs. Then
#                smoke-checks the just-published Home page and one rewritten
#                asset URL before declaring success.
#
# (Agent-invoked check-wiki — during /work, wiki-author — uses the bundled
# ${CLAUDE_PLUGIN_ROOT}/scripts/check-wiki.py directly; no vendoring needed there.)
#
# Publish = mirror semantics — add, edit, rename, delete. rsync -a preserves the
# dir tree, so a per-folder _Sidebar.md renders as that section's nav (GH Wiki uses
# the nearest one). Fails loudly on duplicate basenames across subdirs (GH Wiki
# resolves page LINKS by basename, so collisions would silently clobber) — but
# _Sidebar.md / _Footer.md are exempt: location-rendered, never linked by basename.
# Gracefully skips when the wiki is disabled on the repo.
#
# Repo-agnostic: no hard-coded owner/repo (uses ${{ github.repository }} + the
# repo's own default branch). This is a starting point — you own it after it
# lands; edit it freely. `wiki-init` only seeds it once.

on:
  push:
    paths:
      - 'wiki/**'
      - '.github/scripts/check-wiki.py'
      - '.github/scripts/wiki_publish_transform.py'
  pull_request:
    paths:
      - 'wiki/**'
      - '.github/scripts/check-wiki.py'
      - '.github/scripts/wiki_publish_transform.py'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-wiki:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Lint wiki/ structure
        # ubuntu-latest ships python3; check-wiki.py is stdlib-only.
        run: python3 .github/scripts/check-wiki.py --strict --root wiki

  update-wiki:
    needs: lint-wiki
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Sync wiki/ to GitHub Wiki
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ ! -d wiki ]]; then
            echo "::notice::No wiki/ directory in source — nothing to sync."
            exit 0
          fi

          dupes=$(find wiki -type f -name '*.md' -not -name '_Sidebar.md' -not -name '_Footer.md' | awk -F/ '{print $NF}' | sort | uniq -d || true)
          if [[ -n "$dupes" ]]; then
            echo "::error::Duplicate wiki basenames (would collide on GitHub Wiki):"
            while IFS= read -r name; do
              echo "::error::  $name"
              find wiki -type f -name "$name" | sed 's|^|::error::    |'
            done <<< "$dupes"
            exit 1
          fi

          wiki_url="https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.wiki.git"
          if ! git ls-remote "$wiki_url" >/dev/null 2>&1; then
            echo "::notice::GitHub Wiki not enabled for ${REPO}. Skipping sync."
            exit 0
          fi

          git clone "$wiki_url" wiki-repo

          rsync -a --delete --exclude='.git' wiki/ wiki-repo/

          # Publish-time transform (F10/F11): strip YAML frontmatter (GitHub
          # Wiki doesn't render it) and rewrite relative, non-.md asset links
          # (images, PDFs) to raw-asset URLs (GitHub Wiki serves pages at flat
          # URLs, so a tree-relative link 404s).
          python3 .github/scripts/wiki_publish_transform.py wiki-repo --repo "$REPO"

          cd wiki-repo
          git add -A
          if git diff --cached --quiet; then
            echo "::notice::No wiki changes to sync."
            exit 0
          fi

          git -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
              -c user.name='github-actions[bot]' \
              commit -m "sync: ${SHA:0:7}"
          git push origin HEAD:master

      - name: Verify published pages render
        env:
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          check_url() {
            local url="$1" label="$2" attempt
            for attempt in 1 2 3; do
              if curl -sfL -o /dev/null "$url"; then
                echo "OK ($label): $url"
                return 0
              fi
              echo "  attempt $attempt failed for $url, retrying..."
              sleep 3
            done
            echo "::error::$label did not return 200 after 3 attempts: $url"
            return 1
          }

          # 1) The wiki's Home page (github.com/.../wiki redirects there).
          check_url "https://github.com/${REPO}/wiki" "wiki Home"

          # 2) A page carrying at least one rewritten raw-asset URL, plus the
          # raw asset URL itself — smoke-checks the F11 fix end to end using
          # whatever the transform actually produced (no hardcoded filenames
          # to go stale).
          page_with_asset=$(grep -rl 'raw\.githubusercontent\.com/wiki/' wiki-repo --include='*.md' | head -1 || true)
          if [[ -z "$page_with_asset" ]]; then
            echo "::notice::No page with a rewritten asset URL found — skipping asset-link smoke check."
            exit 0
          fi
          page_name="$(basename "$page_with_asset" .md)"
          check_url "https://github.com/${REPO}/wiki/${page_name}" "sample page ($page_name)"

          asset_url=$(grep -oE 'https://raw\.githubusercontent\.com/wiki/[^) "'"'"']+' "$page_with_asset" | head -1)
          check_url "$asset_url" "raw asset"
