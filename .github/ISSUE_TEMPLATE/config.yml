# Issue template config — controls the "New Issue" picker UX.
#
# blank_issues_enabled: false forces users through one of the structured templates above
# so every new Issue lands with the right label (bug | roadmap) and the Project Track
# filters / Issues tab label filters work cleanly out of the box.

blank_issues_enabled: false

contact_links:
  - name: 🗺️ View the crickets Project
    url: https://github.com/users/alexherrero/projects/5
    about: Roadmap-tracked crickets work (Crickets v3.0 plugin architecture + Crickets v3.x bundle catalog + Backlog + Ideas) lives here. Use the Roadmap Item template above to file a new entry.

  - name: 🛣️ View the agentm Project (memory/harness engine arc)
    url: https://github.com/users/alexherrero/projects/2
    about: Sister project tracking V0 → V7 + FRIDAY + Hardening + Operator-personal. Cross-project dependencies wire up via cross-repo sub-issues.

  - name: 📖 Read ROADMAP-MASTER (governance + bucket order)
    url: https://github.com/alexherrero/crickets/blob/main/wiki/Home.md
    about: Master roadmap lives in the operator's vault (`<vault>/projects/agentm/_harness/ROADMAP-MASTER.md`); the crickets wiki Home points at the published-side docs.

  - name: 💬 General questions — open a Discussion
    url: https://github.com/alexherrero/crickets/discussions
    about: Open-ended questions, design conversations, "is this even the right bundle shape?" — Discussions, not Issues.
