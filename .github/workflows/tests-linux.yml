name: "[T] Linux Tests"
# NOTE: ci-all.yml waits on this workflow by FILENAME (tests-linux.yml). Renaming this
# file breaks the aggregate + the badge. (scripts/test_ci_consistency.py asserts it.)

on:
  push:
    branches: [main]
    paths-ignore:
      - 'wiki/**'
      - '**/*.md'
  pull_request:
    paths-ignore:
      - 'wiki/**'
      - '**/*.md'

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        # Full history so the version-bump guard can resolve its base ref
        # (the PR base SHA on pull_request, the before-SHA on push). The default
        # shallow clone (fetch-depth: 1) only has HEAD, so the base would be
        # unresolvable and the guard would graceful-skip — defeating it in CI.
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
      - name: Install Python deps
        run: pip install pyyaml
      - name: Lint src/ source-of-truth tree (group.yaml + primitive frontmatter)
        run: python3 scripts/lint_src.py
      - name: Capability/plugin names obey the AG naming rule (check-capability-naming)
        # AG Phase-2 conformance gate: bans the reserved -workflows suffix (except
        # the developer-workflows spine) and Opinion names as capability/plugin names.
        run: python3 scripts/check-capability-naming.py
      - name: Unit tests (scripts/ — lint_src, src_model, generate, …)
        # AGENTM_INSTALL_PREFIX + MEMORY_VAULT_PATH: isolate resolve_plan.py's
        # R2.5 task 12 vault-mismatch guard from the runner's environment — see
        # scripts/check-all.sh's identical isolation for the local mirror.
        env:
          AGENTM_INSTALL_PREFIX: /tmp/no-such-agentm-prefix
          MEMORY_VAULT_PATH: ""
        run: cd scripts && python3 -m unittest discover -p 'test_*.py'
      - name: evidence-tracker self-test (61 embedded tests)
        # R2.2 / cricketsPluginsA#3 — the flagship default-FAIL evidence
        # contract was pinned to the singleton .harness/PLAN.md and silently
        # never fired on a named plan (.harness/PLAN-<slug>.md, the actual
        # default multi-plan path); now resolves either. Wired here since
        # this file lives under src/code-review/hooks/, not scripts/, so the
        # unit-tests discover step above never reaches it.
        run: python3 src/code-review/hooks/evidence-tracker/evidence_tracker.py --mode self-test
      - name: Generated dist/ in sync with src/ (generate.py check)
        run: python3 scripts/generate.py check
      - name: Emitted plugin references resolve inside their own dist tree (check-dist-references)
        # R2.1 / cricketsPluginsB#3 — every relative markdown link and
        # ${CLAUDE_PLUGIN_ROOT} path inside an emitted plugin payload must
        # resolve to a real file, so a user who only installed the plugin
        # (never checked out this repo) can actually follow it. Grandfathers
        # known pre-existing gaps (documenter.md's ../documentation.md, the
        # hook docs' unreachable wiki/ links) until their owning plans land.
        run: python3 scripts/check-dist-references.py
      - name: Per-plugin version bumped when its src/ content changed
        # Anti-recurrence guard for the per-plugin-semver fix: a plugin whose
        # src/<slug>/** changed must bump its group.yaml `version:`, else
        # `claude plugin update` can't pull the new primitives. Compares against
        # the PR base (pull_request) or the previous commit (push to main).
        env:
          VERSION_BUMP_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: python3 scripts/check-version-bump.py
      - name: Lint wiki (Diátaxis)
        # Mirrors agentm's tests-linux.yml step. Linux-only (Diátaxis lint is
        # deterministic; no need to run per OS). Added 2026-05-29 to close
        # the pre-existing check-wiki gap that let 23 structural errors
        # accumulate in the crickets wiki unnoticed before this gate landed.
        run: python3 src/wiki-maintenance/scripts/check-wiki.py --strict
      - name: Anti-slop voice gate (check-slop, report-only)
        # PLAN-r3-voice-mechanism task 2 — report-only in both repos' batteries;
        # --report forces exit 0 regardless of findings. Linux-only (deterministic
        # regex gate, no per-OS portability surface).
        run: python3 scripts/check-slop.py --report wiki
      - name: Developer-safety .sh/.ps1 hook twins stay paired (check-hook-parity)
        # Anti-recurrence guard: a hook's .sh and .ps1 twins must stay
        # behaviorally paired — neither may read a workspace-relative .harness/…
        # path without first resolving the workspace from the host's hook-input
        # contract. Pure-Python static check, runs on every OS; the .ps1
        # *behavior* is exercised by the pwsh mirror inside the unit-test step.
        run: python3 scripts/check-hook-parity.py
      - name: github-projects vault==board drift gate (graceful-skip)
        # The D-④ correctness gate. In CI there's no .harness/project.json (the
        # board binding lives in the gitignored vault), so it graceful-skips and
        # stays green — it earns its keep in a board-synced checkout. Linux-only:
        # it's a deterministic Python gate, no per-OS portability surface.
        run: python3 src/github-projects/scripts/check_project_sync.py
      - name: Tag-reachability gate (all tags must be on main)
        # Concurrent-release coordination backstop: tags must point to commits
        # reachable from main, not worker/plan-branch tips. Graceful-skip when
        # neither 'main' nor 'origin/main' resolves (fresh repos, non-main
        # default-branch names). In CI the full history is available (fetch-depth: 0
        # above), so origin/main resolves and the gate is live.
        run: python3 scripts/check_tag_reachability.py
      - name: Install Claude Code CLI (for claude plugin validate)
        run: npm install -g @anthropic-ai/claude-code
      - name: Validate emitted Claude Code plugins (claude plugin validate)
        # R2.1 / cricketsBuild#0+#2 — this claim ("runs as a separate CI step")
        # was false since check-all.sh's creation (commit 875fbad); this step
        # makes it true for the claude half. Non-strict: the marketplace entry's
        # capabilities:/enhances: fields are deliberate soft-composition
        # metadata Claude's schema doesn't recognize — it warns (harmless,
        # ignored at load time) rather than errors, and --strict would wrongly
        # turn that into a failure. `agy plugin validate` has no CI-installable
        # form (agy is not npm-distributed) — stays dogfood-only, per
        # wiki/reference/CI-Gates.md's existing honest phrasing.
        run: |
          claude plugin validate dist/claude-code/.claude-plugin/marketplace.json
          for d in dist/claude-code/plugins/*/; do
            claude plugin validate "$d"
          done

  syntax:
    name: syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: bash -n on every .sh
        run: bash scripts/check-syntax.sh
      - name: AST-parse every .ps1 (pwsh ships on ubuntu-latest)
        shell: pwsh
        run: pwsh -NoProfile -File scripts/check-syntax.ps1

  pii-guardrails:
    name: pii-guardrails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        # gitleaks scans the commit range with `git log <parent>^..<HEAD>` and
        # needs the parent commit reachable in the local clone. The default
        # actions/checkout shallow clone (fetch-depth: 1) only has HEAD, so
        # multi-commit pushes fail with "unknown revision" on the range arg.
        # Pull full history so the incremental scan can resolve the range
        # regardless of how many commits land in one push.
        with:
          fetch-depth: 0
      - name: Run check-no-pii.sh (regex scanner)
        run: bash scripts/check-no-pii.sh --all
      - name: Run gitleaks (industry-standard secret scanner)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        with:
          config-path: .gitleaks.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  obsidian-vault-conformance:
    # The obsidian-vault plugin's conformance/discovery/doctor suites hold the
    # plugin to agentm's StorageBackend contract — they need the agentm kernel
    # clone, so they `skipUnless` in the `validate` unit-test job (crickets-only)
    # and run here with the sibling checked out. Dedicated job so the kernel
    # checkout can't perturb the other gates' scope.
    name: obsidian-vault conformance (vs agentm kernel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Check out the sibling agentm kernel
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: alexherrero/agentm
          path: _agentm
          fetch-depth: 1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
      - name: Install Python deps
        run: pip install pyyaml
      - name: obsidian-vault backend conformance + discovery + doctor (against the real kernel)
        # AGENTM_SCRIPTS points each suite's `_locate_agentm_scripts()` at the kernel
        # `scripts/` — without it they skip (the CI-deterministic clone-absent path).
        env:
          AGENTM_SCRIPTS: ${{ github.workspace }}/_agentm/scripts
        run: cd scripts && python3 -m unittest test_obsidian_vault_conformance test_obsidian_vault_discovery test_obsidian_vault_doctor
