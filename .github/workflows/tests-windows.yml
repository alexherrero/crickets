name: "[T] Windows Tests"
# NOTE: ci-all.yml waits on this workflow by FILENAME (tests-windows.yml). Renaming this
# file breaks the aggregate + the badge. (scripts/test_ci_consistency.py asserts it.)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    name: validate
    runs-on: windows-latest
    env:
      # Force UTF-8 stdio — windows-latest's default cp1252 console encoding
      # is the historical breakage class here (plan #13 caught it live).
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install Python deps
        run: python -m pip install pyyaml
      - name: Lint src/ source-of-truth tree (group.yaml + primitive frontmatter)
        run: python scripts/lint_src.py
      - name: Capability/plugin names obey the AG naming rule (check-capability-naming)
        run: python scripts/check-capability-naming.py
      - name: Unit tests (scripts/ — lint_src, src_model, generate, …)
        # AGENTM_INSTALL_PREFIX + MEMORY_VAULT_PATH: isolate resolve_plan.py's
        # R2.5 task 12 vault-mismatch guard from the runner's environment — see
        # scripts/check-all.sh's identical isolation for the local mirror.
        env:
          AGENTM_INSTALL_PREFIX: /tmp/no-such-agentm-prefix
          MEMORY_VAULT_PATH: ""
        run: cd scripts && python -m unittest discover -p 'test_*.py'
      - name: Generated dist/ in sync with src/ (generate.py check)
        run: python scripts/generate.py check
      - name: Lint wiki (Diátaxis)
        run: python src/wiki-maintenance/scripts/check-wiki.py --strict
      - name: Developer-safety .sh/.ps1 hook twins stay paired (check-hook-parity)
        # See tests-linux.yml for the rationale. Windows matters most here — it is
        # the host whose cp1252 default the .ps1 twins must read past; the gate's
        # own file reads are UTF-8-pinned (PYTHONUTF8=1 above belt-and-suspenders).
        run: python scripts/check-hook-parity.py

  checks:
    name: checks
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # windows-latest ships pwsh 7+ and Python preinstalled.
      - name: Install Python deps
        run: python -m pip install pyyaml
      - name: AST-parse every .ps1
        shell: pwsh
        run: pwsh -NoProfile -File scripts/check-syntax.ps1
      # bash -n skipped on Windows (git-bash is present but path-mangling makes
      # find(1) unreliable; Linux + Mac cover .sh parse).
      - name: Run check-no-pii.sh
        shell: bash
        run: bash scripts/check-no-pii.sh --all

  obsidian-vault-conformance:
    # Windows is where the LF-exact round-trip earns its keep: a `write` degraded to
    # text mode would translate `\n`→`\r\n` only here. The suites need the agentm
    # kernel clone (they skip in the crickets-only `validate` job), so the sibling is
    # checked out in this dedicated job.
    name: obsidian-vault conformance (vs agentm kernel)
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Check out the sibling agentm kernel
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: alexherrero/agentm
          path: _agentm
          fetch-depth: 1
      - name: Install Python deps
        run: python -m pip install pyyaml
      - name: obsidian-vault backend conformance + discovery + doctor (against the real kernel)
        env:
          AGENTM_SCRIPTS: ${{ github.workspace }}/_agentm/scripts
        run: cd scripts && python -m unittest test_obsidian_vault_conformance test_obsidian_vault_discovery test_obsidian_vault_doctor
