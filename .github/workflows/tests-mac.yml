name: "[T] Mac Tests"
# NOTE: ci-all.yml waits on this workflow by FILENAME (tests-mac.yml). Renaming this
# file breaks the aggregate + the badge. (scripts/test_ci_consistency.py asserts it.)

# Worktree-native flow (ratified 2026-07-06): gates on pull_request, not push
# to main. pull_request carries no paths-ignore — a required check a
# trigger-level filter could skip would block a docs-only PR's merge
# forever; the diet returns as a job-level no-op under PLAN-per-plan-ci.
# push runs nothing here; tests-linux.yml's `syntax` job is the one light
# check that still runs on push.
#
# PLAN-per-plan-ci task 3: also callable via `workflow_call` (the nightly
# main-HEAD backstop) — see tests-linux.yml's `on:` block comment for the
# `full_battery` input's full rationale.
on:
  push:
    branches: [main]
    paths-ignore:
      - 'wiki/**'
      - '**/*.md'
  pull_request: {}
  workflow_call:
    inputs:
      full_battery:
        type: boolean
        default: true

jobs:
  validate:
    name: validate
    runs-on: macos-latest
    if: github.event_name == 'pull_request' || inputs.full_battery
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install Python deps
        run: python3 -m pip install --break-system-packages pyyaml
      - name: Lint src/ source-of-truth tree (group.yaml + primitive frontmatter)
        run: python3 scripts/lint_src.py
      - name: Capability/plugin names obey the AG naming rule (check-capability-naming)
        run: python3 scripts/check-capability-naming.py
      - name: Unit tests (scripts/ — lint_src, src_model, generate, …)
        # AGENTM_INSTALL_PREFIX + MEMORY_VAULT_PATH: isolate resolve_plan.py's
        # R2.5 task 12 vault-mismatch guard from the runner's environment — see
        # scripts/check-all.sh's identical isolation for the local mirror.
        env:
          AGENTM_INSTALL_PREFIX: /tmp/no-such-agentm-prefix
          MEMORY_VAULT_PATH: ""
        run: cd scripts && python3 -m unittest discover -p 'test_*.py'
      - name: Generated dist/ in sync with src/ (generate.py check)
        run: python3 scripts/generate.py check
      - name: Lint wiki (Diátaxis)
        run: python3 src/wiki/scripts/check-wiki.py --strict
      - name: Developer-safety .sh/.ps1 hook twins stay paired (check-hook-parity)
        # See tests-linux.yml for the rationale; runs per OS so the static parity
        # check rides every runner the .ps1 behavioral mirror does.
        run: python3 scripts/check-hook-parity.py

  checks:
    name: checks
    runs-on: macos-latest
    if: github.event_name == 'pull_request' || inputs.full_battery
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # macos-latest ships python3 and pwsh 7+ preinstalled.
      - name: Install Python deps
        run: python3 -m pip install --break-system-packages pyyaml
      - name: bash -n on every .sh
        run: bash scripts/check-syntax.sh
      - name: AST-parse every .ps1
        shell: pwsh
        run: pwsh -NoProfile -File scripts/check-syntax.ps1
      - name: Run check-no-pii.sh
        run: bash scripts/check-no-pii.sh --all
