<svg viewBox="0 0 800 560" width="1120" height="784" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="s" markerWidth="10" markerHeight="10" refX="7.2" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5B7C9E"/>
    </marker>
  </defs>

  <g stroke="#5B7C9E" stroke-width="2" fill="none" marker-end="url(#s)">
    <path d="M400,70 L400,102"/>
    <path d="M330,160 L262,204"/>
    <path d="M470,160 L538,204"/>
    <path d="M400,300 L400,406"/>
  </g>

  <!-- src -->
  <text x="36" y="52" font-size="11" font-weight="700" fill="#9aa0a8">ONE SOURCE</text>
  <rect x="300" y="26" width="200" height="44" rx="9" fill="#F0F2F5" stroke="#8a93a0" stroke-width="1.6"/>
  <text x="400" y="53" text-anchor="middle" font-size="12.5" font-weight="600" fill="#3a4250">src/ — primitives, authored once</text>

  <!-- build system -->
  <rect x="250" y="104" width="300" height="54" rx="10" fill="#EAF1FB" stroke="#3A6EA5" stroke-width="2.2"/>
  <text x="400" y="128" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a5f">the build system</text>
  <text x="400" y="146" text-anchor="middle" font-size="9.5" font-style="italic" fill="#3A6EA5">composes the primitives, generates per host</text>

  <!-- per-host plugins -->
  <rect x="142" y="204" width="240" height="52" rx="9" fill="#EAF0F6" stroke="#5B7C9E" stroke-width="1.7"/>
  <text x="262" y="234" text-anchor="middle" font-size="12.5" font-weight="600" fill="#34516e">Claude Code plugins</text>
  <rect x="418" y="204" width="240" height="52" rx="9" fill="#EAF0F6" stroke="#5B7C9E" stroke-width="1.7"/>
  <text x="538" y="234" text-anchor="middle" font-size="12.5" font-weight="600" fill="#34516e">Antigravity plugins</text>
  <text x="400" y="284" text-anchor="middle" font-size="10.5" fill="#34516e">the capability plugins — composing via the <tspan font-family="monospace" font-weight="700">enhances</tspan> config</text>

  <text x="414" y="356" font-size="10" font-style="italic" fill="#8a8a92">a bridge reaches into AgentM, one-way, when it's installed</text>

  <!-- AgentM substrate -->
  <rect x="230" y="408" width="340" height="56" rx="10" fill="#F2EEFB" stroke="#7E57C2" stroke-width="2.2"/>
  <text x="400" y="432" text-anchor="middle" font-size="13" font-weight="700" fill="#5b3a8c">AgentM substrate</text>
  <text x="400" y="450" text-anchor="middle" font-size="10" font-style="italic" fill="#7E57C2">memory · opinions · personas</text>

  <text x="400" y="506" text-anchor="middle" font-size="10" font-style="italic" fill="#8a8a92">The architecture is the machinery: author once, generate per host, compose with enhances, and reach into AgentM. The plugins are what it produces.</text>
</svg>
