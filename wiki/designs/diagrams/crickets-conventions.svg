<svg viewBox="0 0 900 450" width="1125" height="562" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="s" markerWidth="10" markerHeight="10" refX="7.2" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5B7C9E"/>
    </marker>
    <marker id="b" markerWidth="11" markerHeight="11" refX="7.2" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3A9D5D"/>
    </marker>
    <marker id="r" markerWidth="10" markerHeight="10" refX="7.2" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,3 L0,6 Z" fill="#9aa0a8"/>
    </marker>
  </defs>

  <!-- consumers -> conventions -->
  <g stroke="#5B7C9E" stroke-width="1.8" fill="none" marker-end="url(#s)">
    <path d="M150,84 L322,168"/>
    <path d="M450,84 L450,166"/>
  </g>
  <!-- opinions cite (one-way, dashed) -->
  <path d="M755,84 L582,168" stroke="#9aa0a8" stroke-width="1.5" stroke-dasharray="5 4" fill="none" marker-end="url(#r)"/>
  <!-- conventions == enforced by ==> gate (bold) -->
  <path d="M400,262 L334,348" stroke="#3A9D5D" stroke-width="2.6" fill="none" marker-end="url(#b)"/>
  <!-- conventions cites OWN (dashed) -->
  <path d="M520,262 L638,348" stroke="#9aa0a8" stroke-width="1.5" stroke-dasharray="5 4" fill="none" marker-end="url(#r)"/>

  <text x="206" y="138" font-size="9" font-style="italic" fill="#5B7C9E">probe by name (resolver)</text>
  <text x="458" y="135" font-size="9" font-style="italic" fill="#5B7C9E">lean on</text>
  <text x="678" y="138" font-size="9" font-style="italic" fill="#8a8a92">cite — one-way</text>
  <text x="300" y="312" text-anchor="end" font-size="9.5" font-style="italic" fill="#3A9D5D">rules enforced by</text>
  <text x="600" y="312" font-size="9" font-style="italic" fill="#8a8a92">cites, never re-owns</text>

  <!-- consumers -->
  <rect x="40" y="30" width="220" height="54" rx="9" fill="#EAF0F6" stroke="#5B7C9E" stroke-width="1.6"/>
  <text x="150" y="52" text-anchor="middle" font-size="12.5" font-weight="600" fill="#34516e">phase workflows</text>
  <text x="150" y="68" text-anchor="middle" font-size="9" font-style="italic" fill="#5B7C9E">/work · /review · /release</text>

  <rect x="340" y="30" width="220" height="54" rx="9" fill="#EAF0F6" stroke="#5B7C9E" stroke-width="1.6"/>
  <text x="450" y="52" text-anchor="middle" font-size="12.5" font-weight="600" fill="#34516e">personas</text>
  <text x="450" y="68" text-anchor="middle" font-size="9" font-style="italic" fill="#5B7C9E">Engineer · Reviewer · Maintainer</text>

  <rect x="640" y="30" width="230" height="54" rx="9" fill="#EAF0F6" stroke="#5B7C9E" stroke-width="1.6"/>
  <text x="755" y="52" text-anchor="middle" font-size="12.5" font-weight="600" fill="#34516e">opinions</text>
  <text x="755" y="68" text-anchor="middle" font-size="8.7" font-style="italic" fill="#5B7C9E">done · good · efficient · how-we-engineer</text>

  <!-- conventions hub -->
  <rect x="270" y="168" width="360" height="94" rx="11" fill="#EAF1FB" stroke="#3A6EA5" stroke-width="2.4"/>
  <text x="450" y="194" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a5f">conventions</text>
  <text x="450" y="216" text-anchor="middle" font-size="9.2" font-style="italic" fill="#3A6EA5">testing · releasing · ci · code-quality</text>
  <text x="450" y="232" text-anchor="middle" font-size="9.2" font-style="italic" fill="#3A6EA5">agentic-engineering · reliability · coding</text>
  <text x="450" y="248" text-anchor="middle" font-size="9.2" font-style="italic" fill="#3A6EA5">documentation</text>

  <!-- gate + owners -->
  <rect x="190" y="348" width="240" height="54" rx="9" fill="#E9F6EE" stroke="#3A9D5D" stroke-width="1.8"/>
  <text x="310" y="380" text-anchor="middle" font-size="12.5" font-weight="600" fill="#27613f">check-all.sh gate battery</text>

  <rect x="500" y="348" width="300" height="54" rx="9" fill="#FBF3E2" stroke="#C8961E" stroke-width="1.6"/>
  <text x="650" y="372" text-anchor="middle" font-size="11.5" font-weight="600" fill="#8a6516">developer-safety · privacy</text>
  <text x="650" y="388" text-anchor="middle" font-size="11.5" font-weight="600" fill="#8a6516">maintenance · code-review</text>

  <text x="450" y="430" text-anchor="middle" font-size="10" font-style="italic" fill="#8a8a92">conventions holds the standards by name; gates enforce them; it cites the capabilities that own a rule, never re-owns them.</text>
</svg>
