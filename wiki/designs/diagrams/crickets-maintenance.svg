  <text x="779" y="216" text-anchor="start" font-size="7.5" font-style="italic" fill="#7A7A82">re-pins pricing</text>

  <text x="520" y="324" text-anchor="middle" font-size="8.5" font-style="italic" fill="#8A78AE">The detector triggers content-refresh, which re-pins token-audit's pricing; one delivered (dependabot-fixer) + five greenfield.</text>
  <text x="520" y="342" text-anchor="middle" font-size="8.5" font-style="italic" fill="#8A78AE">The repair lives in maintenance; the analysis in diagnostics.</text>
