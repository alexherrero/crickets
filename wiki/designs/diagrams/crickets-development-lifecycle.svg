<svg viewBox="0 0 1120 260" width="1400" height="325" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="s" markerWidth="10" markerHeight="10" refX="7.2" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5B7C9E"/>
    </marker>
    <marker id="r" markerWidth="10" markerHeight="10" refX="7.2" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,3 L0,6 Z" fill="#9aa0a8"/>
    </marker>
  </defs>

  <!-- linear loop edges -->
  <g stroke="#5B7C9E" stroke-width="1.9" fill="none" marker-end="url(#s)">
    <path d="M144,109 L158,109"/>
    <path d="M280,109 L294,109"/>
    <path d="M416,109 L430,109"/>
    <path d="M552,109 L566,109"/>
    <path d="M688,109 L702,109"/>
    <path d="M824,109 L838,109"/>
    <path d="M960,109 L974,109"/>
  </g>
  <!-- bugfix track (dashed) -->
  <g stroke="#9aa0a8" stroke-width="1.5" stroke-dasharray="5 4" fill="none" marker-end="url(#r)">
    <path d="M220,138 L408,180"/>
    <path d="M500,180 L626,140"/>
  </g>
  <text x="288" y="166" font-size="9" font-style="italic" fill="#8a8a92">defect track</text>
  <text x="556" y="166" font-size="9" font-style="italic" fill="#8a8a92">rejoins</text>

  <!-- /setup (once, dim) -->
  <rect x="24" y="80" width="120" height="58" rx="9" fill="#F4F4F6" stroke="#B0B0B8" stroke-width="1.5"/>
  <text x="84" y="105" text-anchor="middle" font-size="12.5" font-weight="600" fill="#8a8a92">/setup</text>
  <text x="84" y="121" text-anchor="middle" font-size="9" font-style="italic" fill="#a0a0a8">once</text>

  <!-- the loop -->
  <g>
    <rect x="160" y="80" width="120" height="58" rx="9" fill="#EAF0F6" stroke="#5B7C9E" stroke-width="1.7"/>
    <text x="220" y="114" text-anchor="middle" font-size="13" font-weight="600" fill="#34516e">/plan</text>
    <rect x="296" y="80" width="120" height="58" rx="9" fill="#EAF0F6" stroke="#5B7C9E" stroke-width="1.7"/>
    <text x="356" y="114" text-anchor="middle" font-size="13" font-weight="600" fill="#34516e">/work</text>
    <rect x="432" y="80" width="120" height="58" rx="9" fill="#EAF0F6" stroke="#5B7C9E" stroke-width="1.7"/>
    <text x="492" y="114" text-anchor="middle" font-size="13" font-weight="600" fill="#34516e">/review</text>
    <rect x="568" y="80" width="120" height="58" rx="9" fill="#EAF0F6" stroke="#5B7C9E" stroke-width="1.7"/>
    <text x="628" y="114" text-anchor="middle" font-size="13" font-weight="600" fill="#34516e">/release</text>
    <rect x="704" y="80" width="120" height="58" rx="9" fill="#EAF0F6" stroke="#5B7C9E" stroke-width="1.7"/>
    <text x="764" y="114" text-anchor="middle" font-size="13" font-weight="600" fill="#34516e">/launch</text>
    <rect x="840" y="80" width="120" height="58" rx="9" fill="#EAF0F6" stroke="#5B7C9E" stroke-width="1.7"/>
    <text x="900" y="114" text-anchor="middle" font-size="13" font-weight="600" fill="#34516e">/deprecate</text>
    <rect x="976" y="80" width="120" height="58" rx="9" fill="#EAF0F6" stroke="#5B7C9E" stroke-width="1.7"/>
    <text x="1036" y="114" text-anchor="middle" font-size="13" font-weight="600" fill="#34516e">/retire</text>
  </g>

  <!-- bugfix -->
  <rect x="384" y="178" width="140" height="50" rx="9" fill="#FBF3E2" stroke="#C8961E" stroke-width="1.6"/>
  <text x="454" y="200" text-anchor="middle" font-size="12.5" font-weight="600" fill="#8a6516">/bugfix</text>
  <text x="454" y="216" text-anchor="middle" font-size="9" font-style="italic" fill="#b5851a">report→analyze→fix→verify</text>

  <text x="560" y="252" text-anchor="middle" font-size="10" font-style="italic" fill="#8a8a92">the loop a developer runs every day — a feature's whole life from plan to retirement; /bugfix is the defect track that rejoins at /release.</text>
</svg>
