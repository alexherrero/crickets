<svg viewBox="0 0 716 384" width="1002" height="538" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect x="6" y="6" width="704" height="372" rx="16" fill="#ffffff" stroke="#E3E3E8" stroke-width="1.5"/>

  <!-- the capability shell -->
  <rect x="20" y="22" width="676" height="344" rx="12" fill="#FCFCFE" stroke="#5563A8" stroke-width="1.7"/>
  <text x="38" y="50" font-size="16" font-weight="700" fill="#2E3470">development-lifecycle</text>
  <text x="38" y="69" font-size="11" font-style="italic" fill="#6E73A0">one example of a capability — a named shell that holds primitives</text>

  <!-- commands -->
  <rect x="38" y="86" width="640" height="84" rx="9" fill="#F5F6FB" stroke="#DADDEA" stroke-width="1.2"/>
  <text x="52" y="107" font-size="11" font-weight="700" fill="#5563A8">COMMANDS</text>
  <g font-size="11.5" fill="#2E3470" text-anchor="middle">
    <rect x="52"  y="122" width="95" height="34" rx="7" fill="#ffffff" stroke="#C4C8DA"/><text x="99.5"  y="143">/plan</text>
    <rect x="155" y="122" width="95" height="34" rx="7" fill="#ffffff" stroke="#C4C8DA"/><text x="202.5" y="143">/work</text>
    <rect x="258" y="122" width="95" height="34" rx="7" fill="#ffffff" stroke="#C4C8DA"/><text x="305.5" y="143">/review</text>
    <rect x="361" y="122" width="95" height="34" rx="7" fill="#ffffff" stroke="#C4C8DA"/><text x="408.5" y="143">/release</text>
    <rect x="464" y="122" width="95" height="34" rx="7" fill="#ffffff" stroke="#C4C8DA"/><text x="511.5" y="143">/bugfix</text>
    <rect x="567" y="122" width="95" height="34" rx="7" fill="#ffffff" stroke="#C4C8DA"/><text x="614.5" y="143">/setup</text>
  </g>

  <!-- agents -->
  <rect x="38" y="184" width="640" height="84" rx="9" fill="#F5F6FB" stroke="#DADDEA" stroke-width="1.2"/>
  <text x="52" y="205" font-size="11" font-weight="700" fill="#5563A8">AGENTS</text>
  <g font-size="11.5" fill="#2E3470" text-anchor="middle">
    <rect x="52"  y="220" width="188" height="34" rx="7" fill="#ffffff" stroke="#C4C8DA"/><text x="146" y="241">worker</text>
    <rect x="270" y="220" width="188" height="34" rx="7" fill="#ffffff" stroke="#C4C8DA"/><text x="364" y="241">tech-lead</text>
    <rect x="488" y="220" width="188" height="34" rx="7" fill="#ffffff" stroke="#C4C8DA"/><text x="582" y="241">project-manager</text>
  </g>

  <!-- hooks -->
  <rect x="38" y="282" width="640" height="74" rx="9" fill="#F5F6FB" stroke="#DADDEA" stroke-width="1.2"/>
  <text x="52" y="303" font-size="11" font-weight="700" fill="#5563A8">HOOKS</text>
  <g font-size="11.5" fill="#2E3470" text-anchor="middle">
    <rect x="52" y="316" width="188" height="34" rx="7" fill="#ffffff" stroke="#C4C8DA"/><text x="146" y="337">phase hooks</text>
  </g>
  <text x="470" y="333" font-size="10.5" font-style="italic" fill="#8A8FB5" text-anchor="middle">every capability is the same shape — a name + its primitives</text>
</svg>
