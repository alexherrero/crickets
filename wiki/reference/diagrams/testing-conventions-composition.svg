<svg viewBox="0 0 800 380" width="1040" height="494" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="req" markerWidth="10" markerHeight="10" refX="7.2" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3 L0,6 Z" fill="#5B7C9E"/></marker>
    <marker id="sub" markerWidth="10" markerHeight="10" refX="7.2" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3 L0,6 Z" fill="#7E57C2"/></marker>
  </defs>

  <!-- testing-conventions plugin (this plugin, left) -->
  <rect x="44" y="88" width="256" height="200" rx="10" fill="#EAF1FB" stroke="#3A6EA5" stroke-width="2.2"/>
  <text x="172" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a5f">testing-conventions</text>
  <text x="172" y="136" text-anchor="middle" font-size="9.5" font-style="italic" fill="#3A6EA5">day-to-day test discipline</text>
  <rect x="66" y="152" width="212" height="52" rx="8" fill="#FBFCFE" stroke="#3A6EA5" stroke-width="1.3"/>
  <text x="172" y="174" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1e3a5f">testing-conventions</text>
  <text x="172" y="191" text-anchor="middle" font-size="9.5" font-style="italic" fill="#3A6EA5">the standing-principles skill</text>
  <rect x="66" y="216" width="212" height="52" rx="8" fill="#FBFCFE" stroke="#3A6EA5" stroke-width="1.3"/>
  <text x="172" y="238" text-anchor="middle" font-size="11.5" font-weight="600" fill="#1e3a5f">no-skip-tests</text>
  <text x="172" y="255" text-anchor="middle" font-size="9.5" font-style="italic" fill="#3A6EA5">the skip-marker rule</text>

  <!-- developer-workflows (the base it requires, right) -->
  <rect x="512" y="120" width="244" height="136" rx="10" fill="#EAF0F6" stroke="#5B7C9E" stroke-width="1.8"/>
  <text x="634" y="152" text-anchor="middle" font-size="13" font-weight="700" fill="#34516e">developer-workflows</text>
  <text x="634" y="170" text-anchor="middle" font-size="9.5" font-style="italic" fill="#5B7C9E">the phase loop</text>
  <rect x="534" y="184" width="200" height="52" rx="8" fill="#FBFCFE" stroke="#5B7C9E" stroke-width="1.3"/>
  <text x="634" y="206" text-anchor="middle" font-size="10.5" fill="#34516e">the dev-loop base</text>
  <text x="634" y="223" text-anchor="middle" font-size="9.5" font-style="italic" fill="#5B7C9E">both must be enabled to load</text>

  <!-- requires (solid slate, this plugin -> base) -->
  <path d="M300,188 L508,188" stroke="#5B7C9E" stroke-width="1.8" fill="none" marker-end="url(#req)"/>
  <text x="404" y="178" text-anchor="middle" font-size="10" font-style="italic" fill="#5B7C9E">requires (hard)</text>

  <!-- substrate -->
  <rect x="242" y="316" width="280" height="52" rx="11" fill="#F2EEFB" stroke="#7E57C2" stroke-width="2"/>
  <text x="382" y="340" text-anchor="middle" font-size="13" font-weight="700" fill="#5b3a8c">AgentM substrate</text>
  <text x="382" y="358" text-anchor="middle" font-size="9.5" font-style="italic" fill="#7E57C2">memory · opinions · personas</text>
  <path d="M172,288 C172,308 300,320 336,320" stroke="#7E57C2" stroke-width="1.8" stroke-dasharray="5 4" fill="none" marker-end="url(#sub)"/>
  <text x="238" y="308" text-anchor="middle" font-size="9.5" font-style="italic" fill="#8a8a92">composes onto, one-way</text>

  <text x="400" y="384" text-anchor="middle" font-size="10.5" font-style="italic" fill="#8a8a92">Solid slate = requires (hard) — both plugins must be enabled for the skill and rule to load.</text>
</svg>
