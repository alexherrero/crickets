<svg viewBox="0 0 800 420" width="1040" height="546" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="enh" markerWidth="10" markerHeight="10" refX="7.2" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3 L0,6 Z" fill="#3A9D5D"/></marker>
    <marker id="sub" markerWidth="10" markerHeight="10" refX="7.2" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3 L0,6 Z" fill="#7E57C2"/></marker>
  </defs>

  <!-- this plugin (centre-left) -->
  <rect x="60" y="120" width="250" height="120" rx="9" fill="#EAF1FB" stroke="#3A6EA5" stroke-width="1.5"/>
  <text x="185" y="164" text-anchor="middle" font-size="14.5" font-weight="700" fill="#1e3a5f">status-line-meter</text>
  <text x="185" y="184" text-anchor="middle" font-size="10.5" font-style="italic" fill="#3A6EA5">the live status-line gauge</text>
  <text x="185" y="207" text-anchor="middle" font-size="10.5" fill="#1e3a5f">▌42%   ⌊18%⌋   $0.14</text>

  <!-- token-audit (right) -->
  <rect x="500" y="120" width="240" height="120" rx="9" fill="#E9F6EE" stroke="#3A9D5D" stroke-width="1.5"/>
  <text x="620" y="164" text-anchor="middle" font-size="13.5" font-weight="700" fill="#27613f">token-audit</text>
  <text x="620" y="184" text-anchor="middle" font-size="10.5" font-style="italic" fill="#3A9D5D">the full cost breakdown</text>
  <text x="620" y="207" text-anchor="middle" font-size="9.5" fill="#27613f">the report — pricing it reuses</text>

  <!-- enhances edge (dashed green, this -> token-audit) -->
  <path d="M310,180 L494,180" fill="none" stroke="#3A9D5D" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#enh)"/>
  <text x="402" y="171" text-anchor="middle" font-size="10" font-style="italic" fill="#3A9D5D">enhances (soft)</text>
  <text x="402" y="200" text-anchor="middle" font-size="9.5" font-style="italic" fill="#8a8a92">live metering; reuses its pricing</text>

  <!-- AgentM substrate -->
  <rect x="245" y="316" width="310" height="56" rx="9" fill="#F2EEFB" stroke="#7E57C2" stroke-width="1.5"/>
  <text x="400" y="340" text-anchor="middle" font-size="13" font-weight="700" fill="#5b3a8c">AgentM substrate</text>
  <text x="400" y="358" text-anchor="middle" font-size="9.5" font-style="italic" fill="#7E57C2">the Claude Code status line it reads</text>
  <path d="M185,240 C185,300 300,312 340,314" fill="none" stroke="#7E57C2" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#sub)"/>
  <text x="196" y="286" font-size="9.5" font-style="italic" fill="#8a8a92">stands alone; rests on</text>

  <text x="400" y="400" text-anchor="middle" font-size="10.5" font-style="italic" fill="#8a8a92">Dashed-green = enhances (soft, optional). Status Line Meter stands alone — without token-audit it shows the used-% gauge alone.</text>
</svg>
