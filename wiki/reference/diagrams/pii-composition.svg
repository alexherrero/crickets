<svg viewBox="0 0 560 340" width="728" height="442" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <defs>
    <marker id="sub" markerWidth="10" markerHeight="10" refX="7.2" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3 L0,6 Z" fill="#7E57C2"/></marker>
  </defs>

  <!-- this plugin (centre) -->
  <rect x="170" y="60" width="220" height="82" rx="9" fill="#EAF1FB" stroke="#3A6EA5" stroke-width="1.5"/>
  <text x="280" y="94" text-anchor="middle" font-size="14.5" font-weight="700" fill="#1e3a5f">pii</text>
  <text x="280" y="114" text-anchor="middle" font-size="10.5" font-style="italic" fill="#3A6EA5">keep personal info out of git</text>
  <text x="280" y="131" text-anchor="middle" font-size="9.5" font-style="italic" fill="#3A6EA5">requires nothing · stands alone</text>

  <!-- substrate -->
  <rect x="140" y="238" width="280" height="56" rx="11" fill="#F2EEFB" stroke="#7E57C2" stroke-width="2"/>
  <text x="280" y="262" text-anchor="middle" font-size="13" font-weight="700" fill="#5b3a8c">AgentM substrate</text>
  <text x="280" y="280" text-anchor="middle" font-size="9.5" font-style="italic" fill="#7E57C2">memory · opinions · personas</text>

  <!-- plugin composes onto substrate -->
  <path d="M280,142 L280,234" stroke="#7E57C2" stroke-width="1.8" stroke-dasharray="5 4" fill="none" marker-end="url(#sub)"/>
  <text x="292" y="192" font-size="9.5" font-style="italic" fill="#8a8a92">rests on, one-way</text>

  <text x="280" y="320" text-anchor="middle" font-size="10" font-style="italic" fill="#8a8a92">No couplings — pii requires nothing and enhances nothing; it stands alone on the AgentM substrate.</text>
</svg>
