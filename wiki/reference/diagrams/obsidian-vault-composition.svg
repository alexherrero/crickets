<svg viewBox="0 0 620 340" width="806" height="442" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <defs>
    <marker id="sub" markerWidth="10" markerHeight="10" refX="7.2" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3 L0,6 Z" fill="#7E57C2"/></marker>
  </defs>

  <!-- this plugin (centre) -->
  <rect x="200" y="72" width="220" height="82" rx="9" fill="#EAF1FB" stroke="#3A6EA5" stroke-width="2.2"/>
  <text x="310" y="104" text-anchor="middle" font-size="14" font-weight="700" fill="#1e3a5f">obsidian-vault</text>
  <text x="310" y="123" text-anchor="middle" font-size="10" font-style="italic" fill="#3A6EA5">the vault storage backend</text>
  <text x="310" y="140" text-anchor="middle" font-size="10" font-weight="600" fill="#3A6EA5">stands alone</text>

  <!-- substrate -->
  <rect x="170" y="248" width="280" height="60" rx="9" fill="#F2EEFB" stroke="#7E57C2" stroke-width="2"/>
  <text x="310" y="273" text-anchor="middle" font-size="13" font-weight="700" fill="#5b3a8c">AgentM memory engine</text>
  <text x="310" y="291" text-anchor="middle" font-size="9.5" font-style="italic" fill="#7E57C2">discovers, selects, and loads the backend</text>

  <!-- plugin -> substrate -->
  <path d="M310,154 L310,244" stroke="#7E57C2" stroke-width="1.8" stroke-dasharray="5 4" fill="none" marker-end="url(#sub)"/>
  <text x="322" y="204" font-size="9.5" font-style="italic" fill="#8a8a92">runs on, one-way</text>

  <text x="310" y="330" text-anchor="middle" font-size="10" font-style="italic" fill="#8a8a92">No plugin couplings — obsidian-vault requires nothing and enhances nothing; it runs on the AgentM memory engine alone.</text>
</svg>
