<svg viewBox="0 0 810 330" width="1053" height="429" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#5B7C9E"/></marker>
    <marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#3A9D5D"/></marker>
    <marker id="an" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#8a93a0"/></marker>
    <marker id="au" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#C8961E"/></marker>
  </defs>

  <!-- Operator -->
  <rect x="320" y="16" width="160" height="38" rx="9" fill="#F0F2F5" stroke="#8a93a0" stroke-width="1.5"/>
  <text x="400" y="40" text-anchor="middle" font-size="12.5" font-weight="600" fill="#3a4250">Operator (you)</text>

  <!-- operator -> gates -->
  <path d="M 372 54 C 352 92, 330 112, 322 148" fill="none" stroke="#8a93a0" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#an)"/>
  <path d="M 430 54 C 452 92, 476 112, 482 148" fill="none" stroke="#8a93a0" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#an)"/>
  <text x="356" y="106" text-anchor="end" font-size="10.5" fill="#6b7480">touch STOP</text>
  <text x="448" y="106" text-anchor="start" font-size="10.5" fill="#6b7480">write STEER.md</text>

  <!-- checkpoint container -->
  <rect x="236" y="126" width="330" height="108" rx="12" fill="#F7FAFE" stroke="#3A6EA5" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="248" y="142" font-size="10" fill="#3A6EA5">before the call runs</text>

  <!-- kill-switch -->
  <rect x="248" y="150" width="145" height="56" rx="9" fill="#EAF1FB" stroke="#3A6EA5" stroke-width="1.5"/>
  <text x="320" y="174" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1e3a5f">kill-switch</text>
  <text x="320" y="192" text-anchor="middle" font-size="10.5" fill="#1e3a5f">STOP → halt</text>

  <!-- steer -->
  <rect x="409" y="150" width="145" height="56" rx="9" fill="#EAF1FB" stroke="#3A6EA5" stroke-width="1.5"/>
  <text x="481" y="174" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1e3a5f">steer</text>
  <text x="481" y="192" text-anchor="middle" font-size="10.5" fill="#1e3a5f">STEER.md → redirect</text>

  <!-- kill-switch -> steer -->
  <path d="M 393 178 L 407 178" fill="none" stroke="#5B7C9E" stroke-width="1.4" marker-end="url(#a)"/>

  <!-- halt wins note -->
  <text x="401" y="224" text-anchor="middle" font-size="9.5" font-style="italic" fill="#5B7C9E">if both fire, the halt wins</text>

  <!-- workflow box A -->
  <rect x="20" y="148" width="168" height="64" rx="9" fill="#EAF0F6" stroke="#5B7C9E" stroke-width="1.5"/>
  <text x="104" y="170" text-anchor="middle" font-size="12.5" font-weight="600" fill="#34516e">developer-workflows</text>
  <text x="104" y="186" text-anchor="middle" font-size="10.5" fill="#34516e">the running loop</text>
  <text x="104" y="201" text-anchor="middle" font-size="9.5" fill="#5B7C9E">/plan · /work · /review · /release</text>

  <!-- A -> checkpoint -->
  <path d="M 188 180 L 234 180" fill="none" stroke="#5B7C9E" stroke-width="1.4" marker-end="url(#a)"/>
  <text x="211" y="172" text-anchor="middle" font-size="10" fill="#5B7C9E">each call</text>

  <!-- checkpoint -> B -->
  <path d="M 566 180 L 612 180" fill="none" stroke="#3A9D5D" stroke-width="1.4" marker-end="url(#ag)"/>
  <text x="589" y="172" text-anchor="middle" font-size="10" fill="#3A9D5D">proceed</text>

  <!-- B safe -->
  <rect x="614" y="148" width="176" height="64" rx="9" fill="#E9F6EE" stroke="#3A9D5D" stroke-width="1.5"/>
  <text x="702" y="176" text-anchor="middle" font-size="12.5" font-weight="600" fill="#27613f">the call runs</text>
  <text x="702" y="193" text-anchor="middle" font-size="10.5" fill="#27613f">a safe step</text>

  <!-- recoverability doctrine -->
  <rect x="20" y="250" width="546" height="52" rx="9" fill="#E9F6EE" stroke="#3A9D5D" stroke-width="1.5"/>
  <text x="293" y="271" text-anchor="middle" font-size="11.5" font-weight="600" fill="#27613f">recoverability — before acting, ask: can this be undone?</text>
  <text x="293" y="289" text-anchor="middle" font-size="10.5" fill="#27613f">yes → proceed and say so    ·    no → stop and ask first</text>

  <!-- doctrine -> A -->
  <path d="M 104 250 L 104 214" fill="none" stroke="#3A9D5D" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#ag)"/>
  <text x="112" y="236" text-anchor="start" font-size="10" fill="#3A9D5D">guides each call</text>

  <!-- commit-on-stop -->
  <rect x="590" y="250" width="200" height="64" rx="9" fill="#FBF3E2" stroke="#C8961E" stroke-width="1.5"/>
  <text x="690" y="271" text-anchor="middle" font-size="12.5" font-weight="600" fill="#8a6516">commit-on-stop</text>
  <text x="690" y="288" text-anchor="middle" font-size="10.5" fill="#8a6516">turn ends → snapshot</text>
  <text x="690" y="303" text-anchor="middle" font-size="9.5" fill="#a67c1e">to refs/auto-save/ — nothing lost</text>

  <!-- B -> commit-on-stop -->
  <path d="M 702 212 L 694 248" fill="none" stroke="#C8961E" stroke-width="1.4" marker-end="url(#au)"/>
  <text x="716" y="234" text-anchor="start" font-size="10" fill="#8a6516">at turn's end</text>
</svg>
