<svg viewBox="0 0 860 320" width="1118" height="416" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#5B7C9E"/></marker>
    <marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#3A9D5D"/></marker>
    <marker id="an" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#8a93a0"/></marker>
  </defs>

  <text x="430" y="28" text-anchor="middle" font-size="10.5" font-style="italic" fill="#8a8a92">four layers, gentlest to most absolute — each catches what the one before it missed</text>

  <!-- Layer 1: proactive rule -->
  <rect x="24" y="70" width="184" height="80" rx="9" fill="#F0F2F5" stroke="#8a93a0" stroke-width="1.5"/>
  <text x="116" y="98" text-anchor="middle" font-size="12.5" font-weight="700" fill="#3a4250">1 · while writing</text>
  <text x="116" y="117" text-anchor="middle" font-size="10.5" fill="#3a4250">the stand-in rule</text>
  <text x="116" y="134" text-anchor="middle" font-size="9.5" font-style="italic" fill="#6b7480">use safe placeholders</text>

  <!-- Layer 2: on-demand scan (this plugin) -->
  <rect x="240" y="70" width="184" height="80" rx="9" fill="#EAF1FB" stroke="#3A6EA5" stroke-width="1.5"/>
  <text x="332" y="98" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1e3a5f">2 · before commit</text>
  <text x="332" y="117" text-anchor="middle" font-size="10.5" fill="#1e3a5f">the on-demand scan</text>
  <text x="332" y="134" text-anchor="middle" font-size="9.5" font-style="italic" fill="#3A6EA5">find + fix, loop until clean</text>

  <!-- Layer 3: pre-push block (this plugin) -->
  <rect x="456" y="70" width="184" height="80" rx="9" fill="#EAF1FB" stroke="#3A6EA5" stroke-width="1.5"/>
  <text x="548" y="98" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1e3a5f">3 · before push</text>
  <text x="548" y="117" text-anchor="middle" font-size="10.5" fill="#1e3a5f">the hard block</text>
  <text x="548" y="134" text-anchor="middle" font-size="9.5" font-style="italic" fill="#3A6EA5">automatic, unskippable</text>

  <!-- Layer 4: CI backstop (green safe outcome) -->
  <rect x="672" y="70" width="164" height="80" rx="9" fill="#E9F6EE" stroke="#3A9D5D" stroke-width="1.5"/>
  <text x="754" y="98" text-anchor="middle" font-size="12.5" font-weight="700" fill="#27613f">4 · in CI</text>
  <text x="754" y="117" text-anchor="middle" font-size="10.5" fill="#27613f">the final backstop</text>
  <text x="754" y="134" text-anchor="middle" font-size="9.5" font-style="italic" fill="#3A9D5D">history stays clean</text>

  <!-- flow arrows: what slips past one is caught by the next -->
  <path d="M 208 110 L 238 110" fill="none" stroke="#8a93a0" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#an)"/>
  <path d="M 424 110 L 454 110" fill="none" stroke="#5B7C9E" stroke-width="1.4" marker-end="url(#a)"/>
  <path d="M 640 110 L 670 110" fill="none" stroke="#3A9D5D" stroke-width="1.4" marker-end="url(#ag)"/>

  <text x="223" y="62" text-anchor="middle" font-size="9" font-style="italic" fill="#8a8a92">if one slips</text>
  <text x="439" y="62" text-anchor="middle" font-size="9" font-style="italic" fill="#8a8a92">if unscanned</text>
  <text x="655" y="62" text-anchor="middle" font-size="9" font-style="italic" fill="#8a8a92">last resort</text>

  <text x="430" y="220" text-anchor="middle" font-size="10.5" font-style="italic" fill="#8a8a92">The first two layers aim to keep the last two from ever having to fire.</text>
</svg>
