<svg viewBox="0 0 760 440" width="988" height="572" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="req" markerWidth="10" markerHeight="10" refX="7.2" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3 L0,6 Z" fill="#5B7C9E"/></marker>
    <marker id="sub" markerWidth="10" markerHeight="10" refX="7.2" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3 L0,6 Z" fill="#7E57C2"/></marker>
  </defs>

  <!-- this plugin (centre) -->
  <rect x="260" y="150" width="240" height="88" rx="9" fill="#EAF1FB" stroke="#3A6EA5" stroke-width="2.2"/>
  <text x="380" y="185" text-anchor="middle" font-size="14.5" font-weight="700" fill="#1e3a5f">releasing-conventions</text>
  <text x="380" y="204" text-anchor="middle" font-size="10.5" font-style="italic" fill="#3A6EA5">the release-discipline layer</text>
  <text x="380" y="222" text-anchor="middle" font-size="9.5" font-style="italic" fill="#3A6EA5">ship-release + version-bump-required</text>

  <!-- base it requires (right) -->
  <text x="560" y="102" font-size="10.5" font-weight="700" fill="#5B7C9E">REQUIRES (hard)</text>
  <rect x="540" y="114" width="200" height="60" rx="9" fill="#EAF0F6" stroke="#5B7C9E" stroke-width="1.6"/>
  <text x="640" y="140" text-anchor="middle" font-size="10.5" font-weight="600" fill="#34516e">development-lifecycle</text>
  <text x="640" y="158" text-anchor="middle" font-size="9.5" font-style="italic" fill="#5B7C9E">the /release phase it gates</text>

  <!-- requires arrow: plugin -> base -->
  <path d="M500,178 C540,166 552,158 556,150" stroke="#5B7C9E" stroke-width="1.5" fill="none" marker-end="url(#req)"/>
  <text x="540" y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#8a8a92">requires as its base</text>

  <!-- substrate -->
  <rect x="240" y="342" width="280" height="56" rx="9" fill="#F2EEFB" stroke="#7E57C2" stroke-width="2"/>
  <text x="380" y="366" text-anchor="middle" font-size="13" font-weight="700" fill="#5b3a8c">AgentM substrate</text>
  <text x="380" y="384" text-anchor="middle" font-size="9.5" font-style="italic" fill="#7E57C2">memory · opinions · personas</text>
  <path d="M380,238 L380,338" stroke="#7E57C2" stroke-width="1.5" stroke-dasharray="5 4" fill="none" marker-end="url(#sub)"/>
  <text x="392" y="294" font-size="9.5" font-style="italic" fill="#8a8a92">composes onto, one-way</text>

  <text x="380" y="424" text-anchor="middle" font-size="10" font-style="italic" fill="#8a8a92">Solid = requires (hard): the plugin needs development-lifecycle and does not install without it.</text>
</svg>
