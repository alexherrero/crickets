<svg viewBox="0 0 860 300" width="1118" height="390" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#5B7C9E"/></marker>
    <marker id="an" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#8a93a0"/></marker>
    <marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#3A9D5D"/></marker>
  </defs>

  <!-- Operator -->
  <rect x="360" y="16" width="160" height="38" rx="9" fill="#F0F2F5" stroke="#8a93a0" stroke-width="1.5"/>
  <text x="440" y="40" text-anchor="middle" font-size="12.5" font-weight="600" fill="#3a4250">Operator (you)</text>

  <!-- operator approves -->
  <path d="M 440 54 L 440 96" fill="none" stroke="#8a93a0" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#an)"/>
  <text x="452" y="80" text-anchor="start" font-size="10" fill="#6b7480">approves at each gate</text>

  <!-- author -->
  <rect x="20" y="102" width="188" height="72" rx="9" fill="#EAF1FB" stroke="#3A6EA5" stroke-width="1.5"/>
  <text x="114" y="130" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1e3a5f">author</text>
  <text x="114" y="149" text-anchor="middle" font-size="10.5" fill="#1e3a5f">interview → design doc</text>
  <text x="114" y="164" text-anchor="middle" font-size="9.5" font-style="italic" fill="#3A6EA5">to Status: final</text>

  <!-- author -> translate -->
  <path d="M 208 138 L 250 138" fill="none" stroke="#5B7C9E" stroke-width="1.4" marker-end="url(#a)"/>

  <!-- translate -->
  <rect x="252" y="102" width="188" height="72" rx="9" fill="#EAF1FB" stroke="#3A6EA5" stroke-width="1.5"/>
  <text x="346" y="130" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1e3a5f">translate</text>
  <text x="346" y="149" text-anchor="middle" font-size="10.5" fill="#1e3a5f">approved doc → parts</text>
  <text x="346" y="164" text-anchor="middle" font-size="9.5" font-style="italic" fill="#3A6EA5">structural pieces</text>

  <!-- translate -> sequence -->
  <path d="M 440 138 L 482 138" fill="none" stroke="#5B7C9E" stroke-width="1.4" marker-end="url(#a)"/>

  <!-- sequence -->
  <rect x="484" y="102" width="188" height="72" rx="9" fill="#EAF1FB" stroke="#3A6EA5" stroke-width="1.5"/>
  <text x="578" y="130" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1e3a5f">sequence</text>
  <text x="578" y="149" text-anchor="middle" font-size="10.5" fill="#1e3a5f">parts → named plans</text>
  <text x="578" y="164" text-anchor="middle" font-size="9.5" font-style="italic" fill="#3A6EA5">in build order</text>

  <!-- sequence -> plans -->
  <path d="M 672 138 L 714 138" fill="none" stroke="#3A9D5D" stroke-width="1.4" marker-end="url(#ag)"/>
  <text x="693" y="130" text-anchor="middle" font-size="10" fill="#3A9D5D">hand off</text>

  <!-- ready for /work -->
  <rect x="716" y="102" width="124" height="72" rx="9" fill="#E9F6EE" stroke="#3A9D5D" stroke-width="1.5"/>
  <text x="778" y="132" text-anchor="middle" font-size="12" font-weight="600" fill="#27613f">ready to build</text>
  <text x="778" y="150" text-anchor="middle" font-size="10.5" fill="#27613f">the /work loop</text>
  <text x="778" y="164" text-anchor="middle" font-size="9.5" font-style="italic" fill="#3A9D5D">picks them up</text>

  <text x="430" y="234" text-anchor="middle" font-size="11.5" font-weight="600" fill="#34516e">One design becomes an ordered set of plans — each a small, buildable piece.</text>
  <text x="430" y="256" text-anchor="middle" font-size="10" font-style="italic" fill="#8a8a92">The three verbs run in order; you sign off before each one advances.</text>
</svg>
