<svg viewBox="0 0 880 540" width="1144" height="702" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="req" markerWidth="10" markerHeight="10" refX="7.2" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3 L0,6 Z" fill="#5B7C9E"/></marker>
    <marker id="enh" markerWidth="10" markerHeight="10" refX="7.2" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3 L0,6 Z" fill="#3A9D5D"/></marker>
    <marker id="sub" markerWidth="10" markerHeight="10" refX="7.2" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3 L0,6 Z" fill="#7E57C2"/></marker>
  </defs>

  <!-- central base -->
  <rect x="330" y="212" width="220" height="76" rx="11" fill="#EAF1FB" stroke="#3A6EA5" stroke-width="2.4"/>
  <text x="440" y="245" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a5f">development-lifecycle</text>
  <text x="440" y="264" text-anchor="middle" font-size="10" font-style="italic" fill="#3A6EA5">the dev-loop base — requires nothing</text>

  <!-- enhancers (left, dashed-green enhances -> center) -->
  <text x="40" y="86" font-size="10.5" font-weight="700" fill="#3A9D5D">ENHANCES (soft)</text>
  <g fill="#27613f">
    <rect x="40" y="100" width="210" height="46" rx="9" fill="#E9F6EE" stroke="#3A9D5D" stroke-width="1.6"/><text x="145" y="122" text-anchor="middle" font-size="12" font-weight="600">code-review</text><text x="145" y="138" text-anchor="middle" font-size="9" font-style="italic" fill="#3A9D5D">sharpens /review</text>
    <rect x="40" y="228" width="210" height="46" rx="9" fill="#E9F6EE" stroke="#3A9D5D" stroke-width="1.6"/><text x="145" y="250" text-anchor="middle" font-size="12" font-weight="600">developer-safety</text><text x="145" y="266" text-anchor="middle" font-size="9" font-style="italic" fill="#3A9D5D">recoverability control</text>
    <rect x="40" y="356" width="210" height="46" rx="9" fill="#E9F6EE" stroke="#3A9D5D" stroke-width="1.6"/><text x="145" y="378" text-anchor="middle" font-size="12" font-weight="600">wiki-maintenance</text><text x="145" y="394" text-anchor="middle" font-size="9" font-style="italic" fill="#3A9D5D">documents at phase boundaries</text>
  </g>
  <g stroke="#3A9D5D" stroke-width="1.6" stroke-dasharray="5 4" fill="none" marker-end="url(#enh)">
    <path d="M250,123 C300,140 300,210 328,232"/>
    <path d="M250,251 L328,250"/>
    <path d="M250,379 C300,362 300,290 328,268"/>
  </g>

  <!-- dependents (right, solid requires -> center) -->
  <text x="630" y="66" font-size="10.5" font-weight="700" fill="#5B7C9E">REQUIRED BY (hard)</text>
  <g fill="#34516e">
    <rect x="630" y="78" width="210" height="40" rx="8" fill="#EAF0F6" stroke="#5B7C9E" stroke-width="1.6"/><text x="735" y="103" text-anchor="middle" font-size="11.5" font-weight="600">design-docs</text>
    <rect x="630" y="128" width="210" height="40" rx="8" fill="#EAF0F6" stroke="#5B7C9E" stroke-width="1.6"/><text x="735" y="153" text-anchor="middle" font-size="11.5" font-weight="600">github-ci</text>
    <rect x="630" y="178" width="210" height="40" rx="8" fill="#EAF0F6" stroke="#5B7C9E" stroke-width="1.6"/><text x="735" y="203" text-anchor="middle" font-size="11.5" font-weight="600">github-projects</text>
    <rect x="630" y="228" width="210" height="40" rx="8" fill="#EAF0F6" stroke="#5B7C9E" stroke-width="1.6"/><text x="735" y="253" text-anchor="middle" font-size="11.5" font-weight="600">releasing-conventions</text>
    <rect x="630" y="278" width="210" height="40" rx="8" fill="#EAF0F6" stroke="#5B7C9E" stroke-width="1.6"/><text x="735" y="303" text-anchor="middle" font-size="11.5" font-weight="600">testing-conventions</text>
  </g>
  <g stroke="#5B7C9E" stroke-width="1.8" fill="none" marker-end="url(#req)">
    <path d="M630,98 C570,120 552,210 550,238"/>
    <path d="M630,148 C580,168 560,220 552,244"/>
    <path d="M630,198 L552,220"/>
    <path d="M630,248 C580,236 560,260 552,258"/>
    <path d="M630,298 C570,290 555,270 552,264"/>
  </g>

  <!-- substrate -->
  <rect x="300" y="440" width="280" height="56" rx="11" fill="#F2EEFB" stroke="#7E57C2" stroke-width="2"/>
  <text x="440" y="464" text-anchor="middle" font-size="13" font-weight="700" fill="#5b3a8c">AgentM substrate</text>
  <text x="440" y="482" text-anchor="middle" font-size="9.5" font-style="italic" fill="#7E57C2">memory · opinions · personas</text>
  <path d="M440,288 L440,436" stroke="#7E57C2" stroke-width="1.8" stroke-dasharray="5 4" fill="none" marker-end="url(#sub)"/>
  <text x="452" y="368" font-size="9.5" font-style="italic" fill="#8a8a92">composes onto, one-way</text>

  <text x="440" y="524" text-anchor="middle" font-size="10" font-style="italic" fill="#8a8a92">Dashed-green = enhances (soft, optional); solid = requires (hard). The base requires nothing and rests on the AgentM substrate.</text>
</svg>
