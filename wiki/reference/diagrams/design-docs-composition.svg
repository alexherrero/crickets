<svg viewBox="0 0 640 480" width="832" height="624" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="req" markerWidth="10" markerHeight="10" refX="7.2" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3 L0,6 Z" fill="#5B7C9E"/></marker>
    <marker id="sub" markerWidth="10" markerHeight="10" refX="7.2" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3 L0,6 Z" fill="#7E57C2"/></marker>
  </defs>

  <!-- this plugin (centre-top) -->
  <rect x="200" y="40" width="240" height="84" rx="9" fill="#EAF1FB" stroke="#3A6EA5" stroke-width="1.5"/>
  <text x="320" y="76" text-anchor="middle" font-size="15" font-weight="700" fill="#1e3a5f">design-docs</text>
  <text x="320" y="96" text-anchor="middle" font-size="10.5" font-style="italic" fill="#3A6EA5">design + decision authoring</text>
  <text x="320" y="112" text-anchor="middle" font-size="9.5" font-style="italic" fill="#3A6EA5">/design · the adr skill</text>

  <!-- requires (hard) -> development-lifecycle -->
  <text x="240" y="188" font-size="10.5" font-weight="700" fill="#5B7C9E">REQUIRES (hard)</text>
  <rect x="200" y="200" width="240" height="70" rx="9" fill="#EAF0F6" stroke="#5B7C9E" stroke-width="1.5"/>
  <text x="320" y="230" text-anchor="middle" font-size="11.5" font-weight="700" fill="#34516e">development-lifecycle</text>
  <text x="320" y="249" text-anchor="middle" font-size="10" font-style="italic" fill="#5B7C9E">runs the /design workflow logic</text>

  <path d="M320,124 L320,196" fill="none" stroke="#5B7C9E" stroke-width="1.8" marker-end="url(#req)"/>
  <text x="332" y="166" text-anchor="start" font-size="10" font-style="italic" fill="#8a8a92">delegates the real work</text>

  <!-- substrate -->
  <rect x="180" y="356" width="280" height="60" rx="11" fill="#F2EEFB" stroke="#7E57C2" stroke-width="2"/>
  <text x="320" y="382" text-anchor="middle" font-size="13" font-weight="700" fill="#5b3a8c">AgentM substrate</text>
  <text x="320" y="400" text-anchor="middle" font-size="9.5" font-style="italic" fill="#7E57C2">memory · opinions · personas</text>
  <path d="M320,270 L320,352" fill="none" stroke="#7E57C2" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#sub)"/>
  <text x="332" y="316" text-anchor="start" font-size="9.5" font-style="italic" fill="#8a8a92">composes onto, one-way</text>

  <text x="320" y="446" text-anchor="middle" font-size="10" font-style="italic" fill="#8a8a92">Solid = requires (hard): design-docs needs development-lifecycle to run /design. No soft enhancers.</text>
</svg>
