<svg viewBox="0 0 860 400" width="1118" height="520" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#5B7C9E"/></marker>
    <marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#3A9D5D"/></marker>
    <marker id="an" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#8a93a0"/></marker>
  </defs>

  <!-- red PR (start) -->
  <rect x="24" y="150" width="152" height="64" rx="9" fill="#F0F2F5" stroke="#8a93a0" stroke-width="1.5"/>
  <text x="100" y="178" text-anchor="middle" font-size="12.5" font-weight="600" fill="#3a4250">update PR, red</text>
  <text x="100" y="195" text-anchor="middle" font-size="10.5" fill="#6b7480">checks failing</text>

  <!-- read (diagnose) -->
  <rect x="212" y="140" width="184" height="84" rx="9" fill="#EAF1FB" stroke="#3A6EA5" stroke-width="1.5"/>
  <text x="304" y="166" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1e3a5f">read the failure</text>
  <text x="304" y="184" text-anchor="middle" font-size="10.5" fill="#1e3a5f">check logs + release notes</text>
  <text x="304" y="200" text-anchor="middle" font-size="9.5" font-style="italic" fill="#3A6EA5">project migration notes first</text>

  <!-- red PR -> read -->
  <path d="M 176 182 L 208 182" fill="none" stroke="#5B7C9E" stroke-width="1.4" marker-end="url(#a)"/>

  <!-- apply + push -->
  <rect x="432" y="140" width="184" height="84" rx="9" fill="#EAF1FB" stroke="#3A6EA5" stroke-width="1.5"/>
  <text x="524" y="166" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1e3a5f">patch &amp; push</text>
  <text x="524" y="184" text-anchor="middle" font-size="10.5" fill="#1e3a5f">apply a fix, push it up</text>
  <text x="524" y="200" text-anchor="middle" font-size="9.5" font-style="italic" fill="#3A6EA5">checks re-run</text>

  <!-- read -> apply -->
  <path d="M 396 182 L 428 182" fill="none" stroke="#5B7C9E" stroke-width="1.4" marker-end="url(#a)"/>

  <!-- still red loop back -->
  <path d="M 524 224 C 524 300, 304 300, 304 228" fill="none" stroke="#5B7C9E" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#a)"/>
  <text x="414" y="292" text-anchor="middle" font-size="10" font-style="italic" fill="#5B7C9E">still red → try again (capped)</text>

  <!-- green outcome -->
  <rect x="672" y="60" width="164" height="72" rx="9" fill="#E9F6EE" stroke="#3A9D5D" stroke-width="1.5"/>
  <text x="754" y="86" text-anchor="middle" font-size="12.5" font-weight="600" fill="#27613f">checks green</text>
  <text x="754" y="104" text-anchor="middle" font-size="10.5" fill="#27613f">comment residual risk</text>
  <text x="754" y="120" text-anchor="middle" font-size="9.5" font-style="italic" fill="#27613f">never merges</text>

  <!-- apply -> green -->
  <path d="M 616 164 C 648 148, 650 118, 668 104" fill="none" stroke="#3A9D5D" stroke-width="1.4" marker-end="url(#ag)"/>
  <text x="648" y="140" text-anchor="start" font-size="10" fill="#3A9D5D">pass</text>

  <!-- abort outcome -->
  <rect x="672" y="240" width="164" height="72" rx="9" fill="#F0F2F5" stroke="#8a93a0" stroke-width="1.5"/>
  <text x="754" y="266" text-anchor="middle" font-size="12.5" font-weight="600" fill="#3a4250">needs judgment</text>
  <text x="754" y="284" text-anchor="middle" font-size="10.5" fill="#6b7480">stop and say so</text>
  <text x="754" y="300" text-anchor="middle" font-size="9.5" font-style="italic" fill="#6b7480">hands it back to you</text>

  <!-- apply -> abort -->
  <path d="M 616 200 C 648 218, 650 244, 668 262" fill="none" stroke="#8a93a0" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#an)"/>
  <text x="648" y="238" text-anchor="start" font-size="10" fill="#8a8a92">out of depth</text>

  <text x="430" y="360" text-anchor="middle" font-size="10.5" font-style="italic" fill="#8a8a92">A bounded repair loop: read the failure, patch, re-run — green comments the residual risk, out-of-depth hands back. It never merges.</text>
</svg>
