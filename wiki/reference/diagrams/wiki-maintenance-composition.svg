<svg viewBox="0 0 820 440" width="1066" height="572" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="enh" markerWidth="10" markerHeight="10" refX="7.2" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3 L0,6 Z" fill="#3A9D5D"/></marker>
    <marker id="sub" markerWidth="10" markerHeight="10" refX="7.2" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3 L0,6 Z" fill="#7E57C2"/></marker>
  </defs>

  <!-- this plugin (centre-left) -->
  <rect x="60" y="120" width="250" height="120" rx="9" fill="#EAF1FB" stroke="#3A6EA5" stroke-width="1.5"/>
  <text x="185" y="164" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1e3a5f">wiki-maintenance</text>
  <text x="185" y="184" text-anchor="middle" font-size="10.5" font-style="italic" fill="#3A6EA5">provisions, authors, watches</text>
  <text x="185" y="206" text-anchor="middle" font-size="10.5" font-style="italic" fill="#3A6EA5">the wiki — stands alone</text>

  <!-- development-lifecycle (right) -->
  <rect x="510" y="120" width="250" height="120" rx="9" fill="#EAF0F6" stroke="#5B7C9E" stroke-width="1.5"/>
  <text x="635" y="164" text-anchor="middle" font-size="11.5" font-weight="700" fill="#34516e">development-lifecycle</text>
  <text x="635" y="184" text-anchor="middle" font-size="10.5" font-style="italic" fill="#5B7C9E">the phase loop</text>
  <text x="635" y="206" text-anchor="middle" font-size="10.5" font-style="italic" fill="#5B7C9E">/plan · /work · /review · /release</text>

  <!-- enhances edge -->
  <path d="M310,180 L506,180" fill="none" stroke="#3A9D5D" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#enh)"/>
  <text x="408" y="170" text-anchor="middle" font-size="10" font-style="italic" fill="#3A9D5D">enhances (soft)</text>
  <text x="408" y="200" text-anchor="middle" font-size="9.5" font-style="italic" fill="#8a8a92">documents at phase boundaries</text>

  <!-- substrate -->
  <rect x="45" y="330" width="280" height="56" rx="9" fill="#F2EEFB" stroke="#7E57C2" stroke-width="1.5"/>
  <text x="185" y="354" text-anchor="middle" font-size="13" font-weight="700" fill="#5b3a8c">AgentM substrate</text>
  <text x="185" y="372" text-anchor="middle" font-size="9.5" font-style="italic" fill="#7E57C2">memory · opinions · personas</text>
  <path d="M185,240 L185,326" fill="none" stroke="#7E57C2" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#sub)"/>
  <text x="197" y="288" text-anchor="start" font-size="9.5" font-style="italic" fill="#8a8a92">rests on, one-way</text>

  <text x="410" y="418" text-anchor="middle" font-size="10.5" font-style="italic" fill="#8a8a92">Dashed-green = enhances (soft, optional). Wiki-maintenance requires nothing and rests on the AgentM substrate.</text>
</svg>
