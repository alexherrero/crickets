name: Wiki
description: Opinionated, template-driven wiki maintenance — the wiki-author authoring/learning
  skill, the documenter agent, the diataxis-evaluator, recent-wiki-changes, and the check-wiki.py
  linter. Maintains a wiki in the operator's voice; enhances developer-workflows' phase-boundary
  documentation when both are installed.
category: documentation
requires: []
standalone: true
# Per-plugin marketplace version. Bump on every release that ships new/changed
# primitives so `claude plugin update wiki-maintenance@crickets` actually pulls
# them (the marketplace entry compares this value; a static version no-ops the
# update). 0.2.0 = first bump past the original 0.1.0 — covers wiki-init,
# wiki-sync.yml, the single-sourced check-wiki.py, and the six-section composer
# shipped since 0.1.0. 0.2.1 = check-wiki.py fix — extract_wiki_links now skips
# fenced code blocks + inline code spans, so a link-shaped template literal (e.g.
# a `]({{placeholder}})` example) is no longer a false-positive broken-link error.
# 0.2.2 = V5-3 Part 1 task 4 — vault group rename: personal-private → personal
# (agentmemory_conventions.py, relocate.py, style_resolver.py updated).
# 0.2.3 = declare capabilities: [wiki-maintenance] (agentm V5-8 LC-5 cutover) +
# remove vestigial probe_capability() function from wiki_watch_dispatch.py (it was
# a tautology: wiki-watch running implies the plugin is installed).
# 0.3.2 = diataxis-author SKILL + documenter + diataxis-evaluator + migrate.py
# modernized four-mode → six-section taxonomy (migrate.py now folds tutorial-shaped
# pages into how-to/ with a <!-- mode: tutorial --> hint; no tutorials/ folder).
# 0.3.3 = check-wiki rule (e) accepts the combined plugin-page shape (## Architecture
# + ## Reference two-parent).
# 0.3.4 = codify the combined plugin-reference page standard — templates/plugin-reference.md
# + section library (architecture-overview / diagram / composition-table / why-not /
# commands-and-skills / configuration) + style/diagram-style.md house SVG spec; plus the
# plain-spoken-overview/how-it-works + required-composition-diagram voice lessons in
# templates/README.md and style/base-style-guide.md.
# 0.3.5 = explanation-page four-beat skeleton — templates/explanation.md rewritten to force
# the why to lead (question · why-up-front · trade-off · what-it-is-not), + the structural
# opinion in templates/README.md. From the Explanation-why audit (5 of 14 pages buried the why).
# 0.3.6 = check-wiki rule (p) — the shape axis. Soft warns when an explanation page is
# table-dominated (fact-dump; fenced diagrams/code don't count) or a reference page is mostly
# prose / over a prose-word ceiling; the combined plugin-reference hybrid is exempt.
# 0.3.7 = diataxis-author: author.py/repair.py's tutorial->dir map corrected from the
# retired "tutorials" folder to "how-to" (matching migrate.py's already-reconciled map);
# SKILL.md's Status section rewritten from stale "stub-shipped" to as-built (8
# sub-commands, 12 scripts, 8 test files); duplicate stub /diataxis repair section deleted.
# 0.3.8 = doc-truth sweep: SKILL.md's ~20 absolute example paths -> repo-relative; SKILL.md's
# + diataxis-evaluator.md's remaining "ADR 0004" citations repointed to the crickets-conventions
# design's documentation domain (the retired ADR is folded there per the ADR-retirement convention).
# 0.3.9 = recent-wiki-changes.sh/.ps1 gained an $AGENTM_SCRIPTS_DIR env-override for
# locating agentm's kernel scripts (agentm_config.py / repo_registry.py) — the dist
# copy ships neither file nor a lib/ fallback dir, so the command was dead on arrival
# in every distribution form; mirrors wiki_watch_config.py's find_agentm_script.
# 0.4.0 = restored documenter.md's normative template source — ../documentation.md
# never existed in this repo; added templates/README.md (Templates + Stylistic
# conventions, restored from agentm's harness/documentation.md predecessor, which
# this plugin subsumed) and repointed documenter.md's two links to it.
# 0.5.0 = PLAN-r3-voice-mechanism task 1 — diataxis-author/style/voice-rules.json,
# the versioned rule pack collapsing the five drifting banned-vocabulary stores
# (docs-prose-style.md, base-style-guide.md:54, the user-facing-prose + llm-tell-
# vocabulary lessons, writing-voice.md) plus the research doc's A2/A3/A4 tell
# catalog, with a vault-side overlay hook; diataxis-author/scripts/rule_pack.py
# (loader + schema validation + overlay merge) and its test suite.
# 0.5.1 = PLAN-r3-voice-mechanism task 2 calibration — voice-rules.json's 4
# Tier-B metric rules gained real thresholds (calibrated against prose-audit.json's
# 72 clean pages); the antithesis-comma-not + prior-art-name-drop templates
# downgraded warning->suggestion after the same calibration pass proved them
# high-FP at single-occurrence granularity (70+ false hits / a brand-voice
# false positive respectively). test_rule_pack.py relocated to top-level
# scripts/ (src/ tests weren't discovered by check-all.sh's unit-tests gate).
# 0.5.2 = PLAN-r3-voice-mechanism task 4 — promoted load-bearing/powerful/
# cutting-edge + the positive-framing and warm-complete-sentences Tonal
# lessons into base-style-guide.md's committed floor via promote.py; added
# a floor_eligible field to voice-rules.json marking the blanket-ban subset
# appropriate for the floor (vs genre-scoped/research-catalog-only additions).
# 0.5.3 = PLAN-r3-voice-mechanism task 5 — codified the role-noun carve-out
# ("the operator"/"the person" is a legitimate role noun, not a third-person
# violation, when it names a different actor's role) in base-style-guide.md,
# next to the existing second-person ban. The term-of-art carve-out was
# already written (2026-06-26); this closes the other private-memory-only gap.
# 0.5.4 = AG Wave A rename 1: enhances target developer-workflows -> development-lifecycle.
# 0.6.0 = AG Wave A rename 2 (PLAN-wave-a-renames-2 task 3): directory renamed
#          wiki-maintenance -> wiki per crickets-wiki.md's Migrations spec;
#          capabilities dualize [wiki-maintenance, wiki]. check-all.sh's
#          check-wiki call site re-pointed to src/wiki/scripts/check-wiki.py
#          (the linter moves with the directory).
# 0.7.0 = L6 wiki-publish-render fix (F10/F11): new
#          scripts/wiki_publish_transform.py strips YAML frontmatter and
#          rewrites relative asset links to raw-asset URLs at publish time
#          (GitHub Wiki renders neither correctly); wired into wiki-sync.yml
#          between rsync and commit, plus a post-push render smoke check.
#          vendor_gate.py now also vendors the transform (vendor_transform())
#          alongside check-wiki.py for consuming repos.
# 0.7.1 = check-wiki gains rule (q) — top-note length, a soft 60-word ceiling
#          on an explanation page's `> [!NOTE]` block. Ported from agentm's
#          rule q (PR #305) to close an undocumented cross-repo-script-parity
#          divergence; confirmed live against crickets' own designs/
#          (crickets-composition.md's top-note ran 64 words).
# 0.7.2 = wiki_publish_transform.py's asset-link rewriter stops treating a
#          bare, extension-less page link (GitHub Wiki's other page-link
#          convention alongside the `.md`-suffixed form) as a relative
#          asset path — it was rewriting a real page link into a broken
#          raw.githubusercontent.com URL. Same bug shape confirmed live in
#          agentm's independent sibling copy of this script (2026-07-16),
#          not parity-checked against this one. New
#          test_wiki_publish_transform.py — no test coverage for this
#          script existed before.
# 0.8.0 = the design plugin's prose-pass skill wired into authoring by
#          default (operator escalation, 2026-07-16): documenter.md runs it
#          (via scripts/prose_pass.py) on every drafted page before
#          preview-before-write (fact-guard list generated first, the latest
#          docs-prose-style overlay glob-resolved and passed explicitly since
#          the script's own default overlay is design-doc-prose, frontmatter/
#          headings/table-structures/Document-History byte-identical,
#          operator lines restored on the skill's Step 2 verify; announced
#          Claude-only fallback via the PROSE-PASS-DEGRADED marker relay —
#          never blocks, never silent; no-network contract gains the named
#          agy exception; own frontmatter 0.1.0 -> 0.2.0). diataxis-author +
#          wiki-author SKILL.md document the step and cross-reference the
#          documenter rather than duplicate the machinery (each 0.1.0 ->
#          0.1.1). Sibling-plugin resolution, NOT a hard requires: — wiki
#          stays standalone.
version: 0.8.0
capabilities: [wiki-maintenance, wiki]
enhances:
  - group: development-lifecycle
    capability: documentation
    effect: "phase commands dispatch the documenter to author/repair wiki pages at phase boundaries"
