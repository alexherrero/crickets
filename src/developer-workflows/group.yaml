name: Developer Workflows
description: The phase-gated developer loop — /setup /plan /work /review /release /bugfix — extracted from agentm as a standalone native plugin. The base other dev plugins enhance.
category: Coding
requires: []
standalone: true
enhances:
  - group: github-projects
    capability: board-sync
    effect: "/work's task close-out (step 10) posts a per-commit progress comment + a task-close comment (SHA-keyed dedupe, list-and-match — never --search) alongside the existing board-item body-fold, when github-projects is installed and gh is authenticated"
# Per-plugin marketplace version. Bump on every release that ships new/changed
# primitives so `claude plugin update developer-workflows@crickets` actually
# pulls them (the marketplace entry compares this value; a static version no-ops
# the update). 0.2.0 = first bump past the original 0.1.0 — covers the phase-spec
# refinements shipped since (the full-task-list /work autonomy + safety
# pre-check, deferred-items-to-Project offers, and the documenter dispatch
# graceful-skip wiring). 0.3.0 = the multi-plan writers — a `resolve_plan.py`
# bridge (delegates to agentm's `resolve-active-plan` verb, graceful `.harness/`
# fallback standalone) + named-plan-aware /work, /plan, /review that target
# PLAN-<name>.md / progress-<name>.md pairs; bare invocations stay byte-identical.
# 0.4.0 = the read side of the multi-plan surface — a `/queue-status-lite`
# command + `queue_status.py` bridge (delegates to agentm's shipped
# `queue_status_lite.py` reader, minimal `.harness/` dashboard standalone) giving
# the coordinator a read-only glance at every active plan. Read-only by contract.
# 0.5.0 = two-tier named-plan staging (V5-10 sibling #1, the named-plan writer) —
# a `stage_plan.py` helper + `/plan --stage <name>` / `/plan --activate <name>`.
# `--stage` emits a plan into the inactive `<_harness>/queued-plans/` tier
# (invisible to /work and /queue-status-lite); `--activate` promotes it to the
# active `PLAN-<name>.md` with a no-clobber guard. Composed onto `resolve_plan`
# (the staging path tracks the resolver's `_harness/`); bare /plan + the one-tier
# `--name` write stay byte-identical.
# 0.5.1 = Windows-portability fix the OS matrix caught in the unreleased 0.5.0:
# `activate()`'s `os.open` fd defaulted to *text* mode on Windows, so `os.write`
# translated `\n`→`\r\n` and the copy wasn't byte-verbatim there. Adds `O_BINARY`
# (Windows-only; no-op on POSIX) so the staged→active copy is verbatim on every OS.
# 0.6.0 = worktree-spawn (V5-10 sibling #2, operator-initiated worker worktrees) —
# a `spawn_worker.py` helper + `/spawn-worker` command. The helper creates a
# `worker/<slug>` git worktree and drops the worktree-local `.harness/active-plan`
# marker (the bare slug agentm's `resolve_active_plan` reads back) so a worker
# binds to `PLAN-<slug>.md` with no `--name` and no singleton ambiguity. Composed
# onto `resolve_plan` (a non-zero resolve gates the spawn — nothing created); the
# divergent-`vault_project` copy is the LC-2 fallback only. Operator-initiated,
# never autonomous (paired with the `worktrees-operator-initiated` norm — the worktree operator-authority rule, developer-safety design).
# 0.7.0 = integration-merge-command (V5-10 sibling #3) — the lifecycle counterpart
# to spawn-worker that CLOSES the loop. An `integrate_worker.py` helper +
# `/integrate-worker` command merges a finished `worker/<slug>` branch into the
# integration branch with `git merge --no-ff`, runs `scripts/check-all.sh` as the
# gate ON THE MERGED TREE (a red gate hard-resets to the captured pre-merge HEAD;
# a conflict `git merge --abort`s — main is never left broken, no commit lost),
# then promotes the worker's `progress-<slug>.md` into mainline progress and prunes
# the worktree. Pure core + injectable gate (tests stub the gate over real git in
# throwaway temp repos — never the real battery). Ships a read-only
# `doctor_worktrees.py` probe that lists + classifies worker worktrees (Risk #6).
# Local merge only — no push (LC-L). developer-safety untouched (LC-O).
# 0.8.0 = role-agent-defs (V5-10 sibling #4, the team roster) — four loose
# `agents/` role-defs composing onto the phase loop as thin skins (LC-6): the
# read-only `researcher` (a thin pointer at `explorer` + light `WebFetch`,
# forward-referencing the operator's global deep-research agent when present),
# the active `tech-lead` (`/design`→`/plan` author, `/design` forward-referenced)
# and `worker` (`/work <named-plan>`, one per worktree), and the read-only
# `project-manager` (a glance over `/queue-status-lite`, forward-referencing
# board-sync + the V5-11 chief-of-staff layer). No new engine, no net-new
# sub-agent — the researcher gap is collapsed to a pure thin skin.
# 0.9.0 = design-command (V5-10 sibling #5) — packages agentm's canonical `design`
# skill into a `/design` command: author a 10-section design doc (draft → review →
# final), translate a final doc into structural `parts/`, then sequence those parts
# into a topo-ordered set of named plans (first activated, rest queued) via the
# shipped `stage_plan.py` writer — completing the `/design`→`/plan` authoring arc
# `tech-lead` forward-references. Crickets idiom: thin command prompt + tested
# stdlib-only helpers (`design_doc.py`'s final-gate + harness-root resolution;
# `design_sequence.py`'s Kahn topo-sort), not agentm's no-Bash skill. The
# host-specific external-review handoff is deferred (#5b); `sequence` reuses
# `stage_plan.py` and never touches the singleton `PLAN.md`.
# 0.10.0 = continues sibling #5 (the `/design translate` flow + the Detailed-Design
# non-empty gate, tasks 3+). 0.9.0 reached origin/main mid-plan (a concurrent
# window's push carried this plan's earlier commits up), so the remaining #5 tasks
# can no longer fold into 0.9.0 — they ship as 0.10.0 so consumers on 0.9.0 can
# `claude plugin update` to the new `translate` primitive. Tasks 4–5 fold here.
# 0.11.0 = recoverability-gate autonomy doctrine (PLAN-developer-workflows-autonomy
# part 1) — a single canonical "Recoverability gate" block inlined byte-identical
# into the three execution commands (`work.md` / `bugfix.md` / `release.md`).
# Because Claude Code drops instruction-file snippets at emit time, the block is
# inlined verbatim, not shared; the stop-gate it states is **recoverability, not
# destructiveness** (recoverable → announce + proceed; unrecoverable → pre-announce
# + stop; uncertain → treat as unrecoverable). Per-command relaxations: /work's
# safety pre-check narrowed to the unrecoverable set; /bugfix's `gh issue *` →
# announce + proceed; /release's summary is a record, not a stop-and-wait barrier.
# Guarded by two new scripts/ tests auto-discovered by the unit-tests gate — a
# byte-identity drift test across the three copies + a carve-out conformance test
# (worktree-initiation, PII hook + pii-scrubber, no-`Co-Authored-By` stay locked).
# 0.12.0 = github-projects board-sync phase hook-points (#41 board-sync, task 7) —
# refines the "GitHub Project" step in `/plan` (Plan kickoff) / `/work` (Task
# progress) / `/release` (Plan + Feature closeout) and adds a graceful-skip note to
# `/bugfix` so each emits to a board via the github-projects plugin's
# `project_sync.py post` when that plugin is installed (capability probe) +
# `.harness/project.json` present + `gh` authed. Deferrals are captured into the
# vault `board-items.json` (board-backed) instead of a raw `gh project item-create`
# that the `vault==board` gate would flag as an orphan. Recoverable + idempotent →
# announce + proceed; silent-skip (zero behavior change) when the plugin/config/gh
# is absent — so developer-workflows standalone is unchanged.
# 0.12.1 = plan-name normalizer parity fix (2026-06-13 adversarial-audit finding
# ML2). The standalone `.harness/` fallback in resolve_plan.py now strips the
# `PLAN-` prefix *before* testing for the singleton — so "PLAN-PLAN.md" resolves to
# the singleton, matching agentm — and rejects a NUL-byte slug, closing the two
# drifts from agentm's authoritative normalizer. A golden-vector parity test is
# added (duplicated verbatim in agentm's suite, no cross-repo import edge — DC-2).
# Fallback-only: delegation to an installed agentm clone is unchanged.
# 0.17.0 = compact-nudge-resume defect fixes (review pass, /review 2026-06-14) —
# two logic bugs in compact-nudge-resume.py: (1) appears_resumed gate incorrectly
# let PCT-path bypass the fresh-session guard (fix: `if not appears_resumed` with no
# conjunction); (2) slug derivation stripped Claude Code's load-bearing leading '-'
# via lstrip (fix: remove lstrip). Two new tests added to test_dw_compact_nudge.py
# to lock both (PCT-high-no-history silent; slug-leading-dash retained).
# 0.18.0 = worktree-per-plan isolation (worktree-pr-loop plan, part 1) — auto-spawn
# a `worker/<slug>` git worktree per plan unit (default ON, config-gated OFF). Two-
# field `isolation` block in `.harness/project.json`: `mode` (worktree-per-plan |
# direct) + `integration` (pull-request | direct-push). Graceful reader mirrors
# `_read_vault_project()`. Precedence: --no-isolate > project.json > code-default-ON.
# Lifted PR helpers (`finalize_pr` / `finalize_direct` / `prepare_branch` /
# `check_gh_available`) from wiki-maintenance via duplicate-with-drift-test (probe #3
# found cross-plugin import unavailable). `finalize_unit.py` closes a plan unit:
# PII guard → push `worker/<slug>` → `gh pr create` (recoverable) or falls back to
# direct push when `gh` is unavailable/unauthenticated. `work.md` + `bugfix.md` gain
# step 1.5 (isolation check + auto-spawn) and step 12 (finalize the unit). Eight
# concurrency mitigations in `spawn_worker.py` (serialize `worktree add`, gc.auto=0,
# no --prune=now, dirty-check, cap at 10, submodule warning). Root-anchor fix: path
# derives from `resolve_main_worktree()` (git rev-parse --git-common-dir), so spawn
# from inside an existing worktree never nests. Single-owner guard: auto-spawn skips
# when already inside a worktree the loop did not create. Carve-out refined (operator-authority refinement, developer-safety design):
# config opt-in IS operator authority; prohibition updated to "without operator
# authority". `gh pr create` added to Recoverable row. Global ~/.claude/CLAUDE.md
# § Worktrees updated (self-mod gate, operator-authorized, dev-setup commit d98261d).
# 0.18.1 = finalize_unit.py exit-code contract fix (post-release bugfix, issue #27).
# main() used result.action as a proxy for failure severity instead of checking
# whether the push step succeeded. Two defects: (1) push-ok/PR-create-fail → exit 2
# ("nothing pushed") but branch was on the remote — callers retrying on exit 2 got a
# duplicate push; (2) push-rejected direct path → exit 1 ("graceful-skip") but
# nothing landed. Fix: use DispatchResult.steps to detect push rc=0 directly;
# push_landed=True → exit 1 (partial, branch on remote), False → exit 2 (nothing
# pushed). 5 new regression tests in test_finalize_unit.py (2 were RED before the fix).
# 0.19.0 = concurrent-release coordination (worktree-pr-loop plan, part 2) — three
# hardening layers that make the force-push-on-shared-tag trap structurally
# unreachable: (1) `check_tag_reachability.py` gate added to `check-all.sh` and CI
# (tags must point to main-reachable commits; graceful-skip when main is absent); (2)
# `/release` step 7 mandates a pre-tag reachability check before `gh release create`;
# (3) `main` branch-protection requirements documented (required CI status checks +
# squash/rebase + no force-push + linear history) + the serialized-single-writer
# model documented with its re-audit trigger. Recorded as the concurrent-release-coordination
# decision in the development-lifecycle design's amendment log (building on the machine-wide
# worktree operator-authority rule).
# 0.20.0 = single-writer artifact integration (Model A, worktree-pr-loop plan, part 3,
# task 2) — concurrent worker branches commit src + `dist/` regenerated at the *current*
# (unbumped) version and defer ONLY the `group.yaml` bump to a serialized integrator, so
# cross-plugin `marketplace.json` collisions are structurally impossible. `integrate_worker.py`
# gains an injectable `prepare` hook: the default `_artifact_prepare` runs the project's
# `scripts/integrate-prepare.sh` on the freshly-merged tree, BEFORE the gate; a failed or
# raising prepare rolls the merge back (rc 2) and the gate never runs. Absent the script it
# no-ops (rc 0) — pre-Model-A repos are unchanged. `check-version-bump.py` becomes branch-
# aware (a `worker/` branch, or `$VERSION_BUMP_DEFER` truthy, downgrades a missing bump to
# advisory). The `dist-sync` gate stays fully authoritative everywhere (UNTOUCHED). crickets
# ships the concrete `integrate_prepare.py` (diff-slugs → bump → regen → commit) + a thin
# `integrate-prepare.sh` wrapper. Recorded as the single-writer-integration decision in the development-lifecycle design's amendment log.
# 0.20.1 = Windows bash-stub portability fix the OS matrix caught in the unreleased 0.20.0.
# The gate (`check-all.sh`) + the artifact-prepare hook (`integrate-prepare.sh`) run via
# `bash`; on the windows-2025 runner plain `bash` resolves to `System32\bash.exe` — the WSL
# launcher, which exits 1 ("no installed distributions") when no distro is present,
# spuriously reddening both. New `_posix_bash()` resolver prefers Git-for-Windows bash over
# the WSL stub (a no-op on POSIX), wired into both helpers; 5 resolver tests cover it. The
# two stub-script test writes switch to `write_bytes` so the `.sh` is LF — `write_text`
# CRLF-translates on Windows, which turns `exit 0` into a non-numeric `exit 0\r`.
# 0.20.2 = deterministic, protection-respecting integration (worktree-pr-loop plan, part 3,
# task 3). `integrate_worker.py` now serializes the landing: an injectable `_integrate_lock`
# (default `fcntl.flock(LOCK_EX)` on `.git/integrate.lock`, a cooperative no-op on Windows,
# graceful-skip on OSError) is held across the whole merge → prepare → gate → consolidate
# critical section, so a second concurrent `/integrate-worker` blocks rather than racing on
# the shared integration branch + version registry — build N-wide, integrate one-at-a-time
# (LC-1/LC-5). A standing conformance test (`test_integration_no_admin_bypass.py`) pins that
# the integration flow never carries the admin branch-protection bypass (LC-3); the command
# spec records the serialize lock + protected-path landing contract. Integration stays a
# LOCAL merge (it never pushes); the operator lands through branch protection + required CI.
# 0.20.3 = pre-flight reconcile against already-shipped lanes (worktree-pr-loop plan, part 3,
# task 4). New `preflight_reconcile.py` helper: a staged/active plan that declares the net-new
# files it ships under an `expected_artifacts:` frontmatter list is "already shipped" iff EVERY
# listed path already exists on `main` (a repo-local existence check — the integration branch's
# tree IS main in the single-writer flow, no git subprocess). `stage_plan.py activate` and
# `spawn_worker.py spawn` now consult it before mutating and return exit 3 ("already shipped —
# nothing to do", nothing written) on a redundant launch — the direct fix for the run's wasted
# V5-4 lane (LC-6). Benign no-op, distinct from the loud-2 / skip-1 codes; dormant unless a plan
# opts in (absent the key → byte-identical behavior, fully back-compat). `/plan --activate` is
# the primary chokepoint; `/spawn-worker` runs the same reconcile as a defense-in-depth backstop.
