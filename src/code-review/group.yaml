name: Code Review
description: Standalone adversarial code review of any diff or PR — the adversarial-reviewer (+ cross-model Gemini) agents, the evidence-tracker hook, a /code-review command, a /simplify command, and security-review + testing-strategy skills. Enhances developer-workflows' review capability when both are installed.
# 0.2.0 = skill enrichment batch: /simplify command (Chesterton's Fence + Rule of 500),
# security-review skill (three-tier boundary: LLM API / persistence / system execution),
# testing-strategy skill (DAMP over DRY + Beyonce Rule + Prove-It pattern),
# security-auditor agent, test-engineer agent.
# 0.2.1 = declare capabilities: [adversarial-review] so the agentm V5-8 capability
# resolver can answer "is adversarial-review available?" (LC-5 cutover).
# 0.2.2 = (undocumented prior bump)
# 0.2.3 = evidence-tracker now recognizes a NAMED plan (.harness/PLAN-<slug>.md),
# not just the singleton .harness/PLAN.md — the default-FAIL contract was
# silently dead on the multi-plan path every worker/named-plan session
# actually uses (cricketsPluginsA#3, PLAN-r2-enforcement-and-sync task 1).
# 0.2.4 = cross-review.sh's validate() is now sourceable in isolation (a
# source-guard wraps the gemini-calling main() so a test can exercise the
# real output-contract check without needing the gemini CLI installed).
# 0.2.5 = evidence-tracker recognizes ABLATE_EVIDENCE_TRACKER=1 — the
# mechanical-uplift baseline off-state (agentm PLAN-r3-uplift-scoring task 1,
# R3.1a): enforcement disabled, the bad-flip fixture sails through
# undetected (rc 0 instead of 2). Additive to the default-FAIL contract.
version: 0.2.5
category: Coding
requires: []
standalone: true
capabilities: [adversarial-review]
enhances:
  - group: developer-workflows
    capability: review
    effect: "/review dispatches the adversarial reviewers (failing test / DEFECT: file:line / NO ISSUES FOUND)"
