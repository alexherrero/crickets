name: Code Review
description: Standalone adversarial code review of any diff or PR — the adversarial-reviewer (+ cross-model Gemini) agents, the evidence-tracker hook, and a /code-review command. Enhances developer-workflows' review capability when both are installed.
category: Coding
requires: []
standalone: true
enhances:
  - group: developer-workflows
    capability: review
    effect: "/review dispatches the adversarial reviewers (failing test / DEFECT: file:line / NO ISSUES FOUND)"
