name: Token Audit
description: Deterministic transcript-JSONL cost analyzer — per-message cost curve, 5h rolling window, floor breakdown, and cache-read vs cache-write vs fresh-input split. Prerequisite for Part C (status-line meter) and Part G (heat-based floor).
category: Coding
requires: []
standalone: true
# Per-plugin marketplace version. Bump on every release that ships new/changed
# primitives so `claude plugin update token-audit@crickets` actually pulls them.
# 0.1.0 = initial plugin: pricing.py (one pricing table, reusable by Part C) +
# analyzer.py (streaming JSONL reader, per-message cost, 5h rolling window,
# floor breakdown, cache split with "% served from cache") + /token-audit command
# (headline + per-message table + window sums + floor, --by-phase flag for phase
# attribution from /plan|/work|/review|/release|/bugfix markers). Schema verified
# 2026-06-14 against real Claude Code 1.x JSONL: input_tokens /
# cache_creation_input_tokens / cache_read_input_tokens / output_tokens all present;
# cache_creation.ephemeral_5m_input_tokens and ephemeral_1h_input_tokens tracked
# but priced at the same rate (TODO: distinguish when Part C needs it).
# 0.1.1 = R0.7 repairs (Mythos readiness audit, 2026-07-01/02): pricing.py
# re-pinned against the 2026-07-03 Anthropic pricing page — adds claude-fable-5
# and claude-sonnet-5 rows (a pure fable-5 session priced at $0 before this);
# analyzer.py's --by-phase attribution now matches the real
# <command-name>/cmd</command-name> XML Claude Code encodes slash commands as,
# with the raw '/cmd'-prefix match kept as a fallback for non-Claude-Code hosts
# (the old startswith('/cmd') check never fired against a real transcript);
# the phase-attribution test fixture is a literal real transcript snippet, not
# a synthesized approximation.
# 0.2.0 = PLAN-efficiency-automation (2026-07-04): the automation layer the
# token-audit design's 2026-07-04 amendment specifies — routing_table.py (the
# versioned work-type -> (tier, model_id, effort) table, parity-guarded
# against pricing.py's PRICING keys) + classify_work_type.py (the three-step
# resolver: persona-declared -> role-name match -> UNCLASSIFIED-DEFAULT) land
# first; the fan-out cost gate, /handoff-pack, and the routing-conformance
# report land as later tasks in the same plan/version.
version: 0.2.0
capabilities: [token-audit]
