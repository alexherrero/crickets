name: GitHub Projects
description: One-way, deterministic board-sync — synthesizes a vault project's roadmap/plan/progress state onto a GitHub Project board via six locked per-type templates, a single idempotent project_sync.py write path, and a vault==board drift gate. The vault stays the agent's source of truth; the board is the generated human source.
category: Coding
requires: [development-lifecycle]
standalone: false
# Per-plugin marketplace version (see developer-workflows/group.yaml for the
# rationale). 0.1.0 = first cut of the github-projects group (roadmap #41 /
# catalog #8): the plugin scaffold + the PII-safe project.json schema. The
# render path (project_model.py / project_sync.py), the vault==board gate, the
# phase-hook emission, and the inaugural backfill land in later 0.1.0-plan tasks.
# 0.1.1 = end-of-plan /review fix (DEFECT 1): _closeout_values folds the deferral
# `→ <link>` into the `deferred` value (dropping the {{deferred_link}} template
# placeholder) so the operator's deferred prose survives an absent/unmaterialized
# target instead of being silently dropped with the whole clause; + fmt_date now
# rejects impossible calendar dates (DEFECT 3).
# 0.1.2 = isolation block added to project_schema.json — two-field `isolation`
# object (`mode` ∈ {worktree-per-plan, direct, worktree-per-task}; `integration`
# ∈ {pull-request, direct-push}) with `additionalProperties: false`. Consumed by
# the developer-workflows loop's `isolation_config.py` reader.
# 0.1.3 = worktree-per-task mode active — schema description updated from
# "reserved for a future conditional per-task isolation mode" to the live contract:
# per-task spawning for operator-declared-isolated tasks (Isolated: true in PLAN.md).
# 0.1.4 = check_project_sync.py: skip "missing" drift for vault items whose
# referenced issue is closed (Done-feature history); adds fetch_closed_issue_numbers()
# + closed_issue_numbers param to compute_drift (backward-compatible).
# 0.2.0 = the board write-path (board-write-path plan, tasks 1-7) — closes the
# designed-not-built gap: main() now persists lifecycle state to board-items.json
# and captures a created issue's number (cricketsPluginsA#5); post_comment() posts
# per-commit/task-close comments with SHA-keyed dedupe; sync_fields() writes the
# DC-2 fields (Track/Type/Priority/Start/Target) idempotently and flips Status at
# progress/closeout transitions; sync_nesting()/sync_all_nesting() nest materialized
# Plan/Task issues under their parents via the native addSubIssue GraphQL mutation
# (new sync-nesting CLI subcommand); report_drift.py runs check_project_sync's
# detector unmodified and posts a report-only summary comment, idempotent by a
# drift-content marker (new report-board-drift command). Every write path degrades
# to a no-op on an unreadable state rather than risking a duplicate; never creates a
# field/option (a UI-only action). 79->107 project_sync tests, +3 project_model,
# +10 report_drift, all green.
# 0.2.1 = sync_fields() bugfix (found exercising the write path live, board-write-
# path task 10): Status now syncs from item.status by default, same as every other
# DC-2 field — a Feature/Version/Plan closeout has no flag-driven stage (only a
# task's progress/closeout is flag-postable), so before this fix editing
# board-items.json's status: field and re-running `post` silently never moved the
# board's Status column. The stage-driven task transitions (progress -> In
# Progress, closeout -> Done) still override the vault value when a stage is given.
# 0.2.2 = two more live-only bugs found in the same task-10 exercise (the first
# real close-outs through the write path — agentm #223/#224, crickets #142):
# (1) resolve_board_item()'s `gh project item-list` call had no --limit, so gh's
# default 30-item page silently dropped any issue past the first page on a project
# with 100+ items — a real issue read back as "not a project item yet" and every
# field write no-op'd. Added --limit 1000 (matches check_project_sync.py's ceiling
# for issue lists). (2) sync_fields()'s idempotent-skip compared against the
# field's display-case name ("Track", "Status"), but `gh project item-list
# --format json` keys per-field values by a lowercased name ("track", "status") —
# the comparison never matched real gh output, so idempotent skip silently never
# fired (Track "needed" a same-value edit on every run). Case-folds the lookup.
# Both caught by re-running the identical close-out post live and confirming zero
# further gh writes — the write path's own idempotency contract, verified against
# real GitHub Project boards, not just fixtures.
# 0.2.3 = project_schema.json's isolation.mode description + default corrected
# from worktree-per-plan to direct, matching developer-workflows' isolation_config.py
# code-default flip (R2.5 task 11 — the operator's worktree doctrine, ADR 0028
# refining ADR 0022; cricketsPluginsA#2). The schema was a stale live claim about
# current behavior, not a historical record — corrected in place.
# 0.2.4 = AG Wave A rename 1: requires: [developer-workflows] -> [development-lifecycle].
# 0.2.5 = live-drift bugfix (found auditing Project #5 against a growing issue
# batch, #150-152): `post`'s CREATE path built `gh issue create` via
# `build_commands()` but never threaded the returned issue URL into a follow-up
# `gh project item-add` — `build_commands()` already supported an `issue_url` arg
# for exactly this, but the CLI (`_post_main`) never supplied it, so every issue
# `post` created was rendered + body-synced but silently never linked onto the
# board (its Status field then had nothing to write to, even though
# check_project_sync.py reported "in sync" — that check only compares body
# content, not project-item linkage). `_post_main` now runs the item-add as a
# second phase once the created issue's URL is known (dry-run previews it with a
# placeholder URL). 8 backlog issues were found already drifted this way; 5
# live vault-tracked ones (#26/#146/#150/#151/#152) were relinked + field-synced
# by hand — 3 closed non-vault "plan orphans" (#24/#25/#27) were deliberately
# left off Project #5, matching the earlier orphan-cleanup plan's intent.
# 0.3.0 = AG Wave D — the Planner (TPM) persona's depth-maintainer (new
# depth_maintain.py): scans board-items.json for a Feature/Sub-feature with
# zero materialized Plan children while a real, active PLAN-<slug>.md exists,
# and either materializes the missing Plan in-memory (id-equals-feature-id
# convention, or an explicit fields.plan_slug override) or flags it for
# operator judgment when neither signal resolves — never guesses via fuzzy
# title matching. Composes on project_model.py/project_sync.py; never calls
# `gh` itself, never modifies sync_fields/sync_nesting/resolve_field_ids.
# 0.3.1 = AG Wave D — the Planner (TPM) persona's drift-corrector (new
# drift_correct.py): independently re-derives update/orphan drift (never
# parses check_project_sync.compute_drift's string lines, and never modifies
# that module) and acts on it — `update` calls project_sync.py's existing
# `post` body-sync path by item id (the same idempotent write it already
# does manually); `orphan` is surfaced as an operator-facing flag and NEVER
# auto-closed or edited (the plan's own locked design call, carried forward
# from the superseded chief-of-staff plan). report_drift.py/
# github-projects:report-board-drift itself stays report-only and unmodified.
# 0.3.2 = AG Wave D task 4: new planner_maintain.py composes depth_maintain.py
# + drift_correct.py into one entrypoint (depth pass persists to
# board-items.json before the drift pass runs, so a just-materialized
# Plan/Task is visible to its own disk re-read) + a new planner-maintain
# command for explicit invocation. Wired into development-lifecycle's
# work.md step 10 and release.md steps 7/8 at the existing graceful-skip
# board-sync gate (development-lifecycle 0.34.7 -> 0.34.8). No dispatcher
# exists yet that reads a persona's modes:/triggers: and routes into this —
# that plumbing (persona_resolve.py/persona_compile.py) lives in agentm and
# validates shape only; when it ships, it calls this same script.
version: 0.3.2
capabilities: [board-sync]
