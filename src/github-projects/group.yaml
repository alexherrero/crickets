name: GitHub Projects
description: One-way, deterministic board-sync — synthesizes a vault project's roadmap/plan/progress state onto a GitHub Project board via six locked per-type templates, a single idempotent project_sync.py write path, and a vault==board drift gate. The vault stays the agent's source of truth; the board is the generated human source.
category: Coding
requires: [developer-workflows]
standalone: false
# Per-plugin marketplace version (see developer-workflows/group.yaml for the
# rationale). 0.1.0 = first cut of the github-projects group (roadmap #41 /
# catalog #8): the plugin scaffold + the PII-safe project.json schema. The
# render path (project_model.py / project_sync.py), the vault==board gate, the
# phase-hook emission, and the inaugural backfill land in later 0.1.0-plan tasks.
# 0.1.1 = end-of-plan /review fix (DEFECT 1): _closeout_values folds the deferral
# `→ <link>` into the `deferred` value (dropping the {{deferred_link}} template
# placeholder) so the operator's deferred prose survives an absent/unmaterialized
# target instead of being silently dropped with the whole clause; + fmt_date now
# rejects impossible calendar dates (DEFECT 3).
# 0.1.2 = isolation block added to project_schema.json — two-field `isolation`
# object (`mode` ∈ {worktree-per-plan, direct, worktree-per-task}; `integration`
# ∈ {pull-request, direct-push}) with `additionalProperties: false`. Consumed by
# the developer-workflows loop's `isolation_config.py` reader.
# 0.1.3 = worktree-per-task mode active — schema description updated from
# "reserved for a future conditional per-task isolation mode" to the live contract:
# per-task spawning for operator-declared-isolated tasks (Isolated: true in PLAN.md).
# 0.1.4 = check_project_sync.py: skip "missing" drift for vault items whose
# referenced issue is closed (Done-feature history); adds fetch_closed_issue_numbers()
# + closed_issue_numbers param to compute_drift (backward-compatible).
# 0.2.0 = the board write-path (board-write-path plan, tasks 1-7) — closes the
# designed-not-built gap: main() now persists lifecycle state to board-items.json
# and captures a created issue's number (cricketsPluginsA#5); post_comment() posts
# per-commit/task-close comments with SHA-keyed dedupe; sync_fields() writes the
# DC-2 fields (Track/Type/Priority/Start/Target) idempotently and flips Status at
# progress/closeout transitions; sync_nesting()/sync_all_nesting() nest materialized
# Plan/Task issues under their parents via the native addSubIssue GraphQL mutation
# (new sync-nesting CLI subcommand); report_drift.py runs check_project_sync's
# detector unmodified and posts a report-only summary comment, idempotent by a
# drift-content marker (new report-board-drift command). Every write path degrades
# to a no-op on an unreadable state rather than risking a duplicate; never creates a
# field/option (a UI-only action). 79->107 project_sync tests, +3 project_model,
# +10 report_drift, all green.
# 0.2.1 = sync_fields() bugfix (found exercising the write path live, board-write-
# path task 10): Status now syncs from item.status by default, same as every other
# DC-2 field — a Feature/Version/Plan closeout has no flag-driven stage (only a
# task's progress/closeout is flag-postable), so before this fix editing
# board-items.json's status: field and re-running `post` silently never moved the
# board's Status column. The stage-driven task transitions (progress -> In
# Progress, closeout -> Done) still override the vault value when a stage is given.
version: 0.2.1
capabilities: [board-sync]
