name: Privacy
description: Scan diffs and the working tree for personal information (emails, personal paths, API keys, phone numbers) before commit or push.
category: Coding
requires: []
standalone: true
# 0.1.0 = initial versioned release (version: field previously absent).
# 0.2.0 = add pii-patterns rule: proactive stand-in conventions so the
#          pii-scrubber skill and pre-push hook never have to catch these patterns.
# 0.2.1 = declare capabilities: [privacy] (AG Phase-2 hygiene; capability name ≠
#          plugin name — the pii→privacy plugin rename is Phase-3).
# 0.3.0 = the detect + enforce layers (check-no-pii.sh, templates/hooks/pre-push)
#          moved from repo-root into this group's own scripts/ + templates/hooks/ —
#          they now actually ship inside the plugin payload instead of only
#          existing in a sibling crickets checkout (R2.4 task 7). A thin repo-root
#          shim keeps every existing caller (check-all.sh, tests-linux.yml, the
#          installed pre-push hook) working unchanged. pii-scrubber's resolution
#          order now prefers the bundled ${CLAUDE_PLUGIN_ROOT} copy first.
# 0.3.1 = check-no-pii.sh scan rewritten to spawn one grep per file (combined
#          alternation regex) instead of one grep per (file, pattern) pair —
#          fixes a 9.4x Windows-vs-Mac slowdown from per-file subprocess-spawn
#          overhead under Git-Bash/MSYS2 (PLAN-ci-walltime-diet task 1).
#          Detection behavior unchanged — verified byte-identical findings on
#          the full repo tree + the planted-fixture catch-rate suite.
# 0.4.0 = AG Wave A rename 2 (PLAN-wave-a-renames-2 task 2): directory renamed
#          pii -> privacy. capabilities regains [pii] alongside [privacy] — the
#          directory move (not just the Phase-2 capability-hygiene pass) is what
#          this wave dualizes. Skill/script slugs (pii-patterns, pii-scrubber,
#          pii_scrubber.py) are left unchanged; that primitive-level rename is a
#          separate naming-hygiene call the design doesn't force.
# 0.5.0 = PLAN-wave-d-tokens-and-privacy tasks 4-6: the privacy-review skill
#          (an ASVS/OWASP/NIST/ICO-adapted checklist, falsifiable
#          PRIVACY-RISK <file>:<line> [ASVS-id] output, modeled on
#          code-review's security-review) + a Semgrep taint pack covering
#          the four mechanizable checks (PII-in-URL, PII-in-client-storage,
#          plaintext-columns, third-party-sinks — consent/retention/erasure
#          stay LLM-judged inside the skill) + scrub_text.py, a new
#          arbitrary-text scrub surface bridging to agentm's
#          privacy_scrub.scrub_pii rules (reused, not forked), now wired
#          explicitly into diagnostics' writer.py incident-write path.
#          privacy-review's opinion-wiring (good + how-we-engineer) is
#          documented as a deferred intent, not a working connection: a
#          static markdown skill has no code-level render step to inject
#          resolved opinion text into today (the same grammar gap
#          PLAN-wave-d-opinion-wiring found and left for a follow-up task).
# 0.6.0 = PLAN-wave-d-tokens-and-privacy task 4 retrofit: PLAN-opinion-
#          consumer-grammar (#167) landed concurrently with this plan's own
#          close-out and directly closed the deferral above — privacy-review
#          now declares `opinions: [good, how-we-engineer]` and carries real
#          <!-- opinion:name --> marker pairs, baked from committed
#          scripts/opinion-snapshots/ snapshots at build time. Retrofitting
#          this also surfaced and fixed a real gap in #167's own emitters
#          (emit_claude.py / emit_antigravity.py): the directory-copytree
#          branch for skill/hook primitives never called
#          render_primitive_text at all, so no skill's opinions: markers
#          were ever actually re-baked — proven via a deliberate
#          snapshot-divergence probe before and after the fix.
# 0.6.1 = Consolidation CONS-2 task 6: fixed a stale header-comment path in
#          templates/hooks/pre-push (`cp src/pii/templates/hooks/pre-push …`
#          -> `cp src/privacy/templates/hooks/pre-push …`) left over from the
#          pii -> privacy rename (AG Wave A rename 2). Doc-only; the hook's
#          runtime behavior is unchanged.
version: 0.6.1
capabilities: [pii, privacy]
