name: Status Line Meter
description: Live context/cost meter for the Claude Code status line — used-%, 5h-window cost, and floor-share badge. Enhances token-audit with continuous live metering.
category: Coding
requires: []
standalone: true
enhances:
  - group: token-audit
    capability: token-audit
    effect: "live continuous metering via the Claude Code status line"
capabilities: [status-line-meter]
# Per-plugin marketplace version. Bump on every release that ships new/changed
# primitives so `claude plugin update status-line-meter@crickets` actually pulls.
# 0.1.0 = initial plugin: status_line_meter.py (used-%, floor-share badge, 5h-window
# cost) with incremental transcript reader, /tmp cache keyed by session_id, and
# runtime-discovery of token-audit's pricing.py (graceful-skip when absent).
# 0.1.1 = fix: transcript truncation (e.g. /compact) reset — `current_size < last_pos`
# now resets the incremental reader to offset 0 instead of returning stale cached totals.
# 0.1.2 = fix(windows): _cache_path used hardcoded /tmp/ which doesn't exist on Windows;
# replaced with tempfile.gettempdir() so cache writes succeed on all platforms.
# 0.1.3 = declare capabilities: [status-line-meter] (AG Phase-2 hygiene;
#          transitional self-name — absorbed by token-audit in Phase-3).
# 0.1.4 = PLAN-efficiency-automation task 5: budget readout badge — a 5h-window
# sum + a weekly sum against an operator-configured ceiling (CRICKETS_BUDGET_5H /
# CRICKETS_BUDGET_WEEKLY env vars), reading session-cost records from a JSONL
# log (CRICKETS_SESSION_COST_LOG, default a tempdir path). Task 4 (the writer)
# was deferred pending roadmap confirmation, so this reader degrades to an
# empty record set today — no config -> omitted, never an error string.
version: 0.1.4
