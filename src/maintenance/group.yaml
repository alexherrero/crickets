name: Maintenance
description: CI workflows + dependency-update tooling — the dependabot-fixer skill that repairs breakage on Dependabot PRs.
category: Coding
requires: [development-lifecycle]
standalone: false
# Per-plugin marketplace version. 0.1.1 = first explicit version + declare
# capabilities: [ci-repair] (AG Phase-2 capability-declaration hygiene); supersedes
# the implicit 0.1.0 default so `claude plugin update github-ci@crickets` pulls it.
# 0.1.2 = AG Wave A rename 1: requires: [developer-workflows] -> [development-lifecycle].
# 0.2.0 = AG Wave A rename 2 (PLAN-wave-a-renames-2 task 1): directory renamed
#          github-ci -> maintenance per crickets-maintenance.md's Migrations spec;
#          capabilities dualize [github-ci, ci-repair, maintenance] (dependabot-fixer
#          becomes a primitive within maintenance rather than its own capability
#          noun). Zero behavior change — dependabot-fixer's fix loop is unchanged.
# 0.2.1 = PLAN-wave-c-maintenance tasks 1-2: deps-currency (read-only pre-CI
#          drift surfacing) + cve-security-patch (advisory-driven pre-CI
#          patch, advisory handed in — no live GHSA/NVD polling) land as new
#          scripts/ primitives. check-version-bump requires a bump per
#          shipped-content change, ahead of task 5's own version-bump task;
#          tasks 3-4 bump again as they land.
# 0.2.2 = PLAN-wave-c-maintenance task 3: tech-debt-inventory (a standing,
#          recallable `debt`-kind entry per planted item, idempotent via
#          save_entry's own FileExistsError-on-existing-slug guard).
version: 0.2.2
capabilities: [github-ci, ci-repair, maintenance]
