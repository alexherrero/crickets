name: Wiki Maintenance
description: Opinionated, template-driven wiki maintenance — the wiki-author authoring/learning
  skill, the documenter agent, the diataxis-evaluator, recent-wiki-changes, and the check-wiki.py
  linter. Maintains a wiki in the operator's voice; enhances developer-workflows' phase-boundary
  documentation when both are installed.
category: documentation
requires: []
standalone: true
# Per-plugin marketplace version. Bump on every release that ships new/changed
# primitives so `claude plugin update wiki-maintenance@crickets` actually pulls
# them (the marketplace entry compares this value; a static version no-ops the
# update). 0.2.0 = first bump past the original 0.1.0 — covers wiki-init,
# wiki-sync.yml, the single-sourced check-wiki.py, and the six-section composer
# shipped since 0.1.0. 0.2.1 = check-wiki.py fix — extract_wiki_links now skips
# fenced code blocks + inline code spans, so a link-shaped template literal (e.g.
# a `]({{placeholder}})` example) is no longer a false-positive broken-link error.
# 0.2.2 = V5-3 Part 1 task 4 — vault group rename: personal-private → personal
# (agentmemory_conventions.py, relocate.py, style_resolver.py updated).
# 0.2.3 = declare capabilities: [wiki-maintenance] (agentm V5-8 LC-5 cutover) +
# remove vestigial probe_capability() function from wiki_watch_dispatch.py (it was
# a tautology: wiki-watch running implies the plugin is installed).
# 0.3.2 = diataxis-author SKILL + documenter + diataxis-evaluator + migrate.py
# modernized four-mode → six-section taxonomy (migrate.py now folds tutorial-shaped
# pages into how-to/ with a <!-- mode: tutorial --> hint; no tutorials/ folder).
# 0.3.3 = check-wiki rule (e) accepts the combined plugin-page shape (## Architecture
# + ## Reference two-parent).
# 0.3.4 = codify the combined plugin-reference page standard — templates/plugin-reference.md
# + section library (architecture-overview / diagram / composition-table / why-not /
# commands-and-skills / configuration) + style/diagram-style.md house SVG spec; plus the
# plain-spoken-overview/how-it-works + required-composition-diagram voice lessons in
# templates/README.md and style/base-style-guide.md.
# 0.3.5 = explanation-page four-beat skeleton — templates/explanation.md rewritten to force
# the why to lead (question · why-up-front · trade-off · what-it-is-not), + the structural
# opinion in templates/README.md. From the Explanation-why audit (5 of 14 pages buried the why).
# 0.3.6 = check-wiki rule (p) — the shape axis. Soft warns when an explanation page is
# table-dominated (fact-dump; fenced diagrams/code don't count) or a reference page is mostly
# prose / over a prose-word ceiling; the combined plugin-reference hybrid is exempt.
# 0.3.7 = diataxis-author: author.py/repair.py's tutorial->dir map corrected from the
# retired "tutorials" folder to "how-to" (matching migrate.py's already-reconciled map);
# SKILL.md's Status section rewritten from stale "stub-shipped" to as-built (8
# sub-commands, 12 scripts, 8 test files); duplicate stub /diataxis repair section deleted.
version: 0.3.7
capabilities: [wiki-maintenance]
enhances:
  - group: developer-workflows
    capability: documentation
    effect: "phase commands dispatch the documenter to author/repair wiki pages at phase boundaries"
