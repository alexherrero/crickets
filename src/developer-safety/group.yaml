name: Developer Safety
description: Universal control + safety layer — kill-switch, steer, commit-on-stop hooks plus commit-no-coauthor / worktrees-never-auto conventions. Usable in any session; enhances developer-workflows (its hooks engage across the phase loop) when both are installed.
category: Coding
requires: []
standalone: true
enhances: [developer-workflows]
# Per-plugin marketplace version. Bump on every release that ships new/changed
# primitives so `claude plugin update developer-safety@crickets` actually pulls
# them (the marketplace entry compares this value; a static version no-ops the
# update). 0.1.1 = the first bump past the original 0.1.0 — ports the host-portable
# workspace resolution from the .sh hooks to their .ps1 twins (kill-switch, steer,
# commit-on-stop), so the operator-control hooks read the real workspace root on
# Antigravity/Windows (cwd = plugin dir, workspace on stdin) instead of doing inert
# cwd-relative .harness/ checks. Restores .sh/.ps1 parity; .sh + Claude Code behavior
# unchanged. 0.1.2 = hardens commit-on-stop.ps1 against the pwsh-7.4 native-command
# throw: with $PSNativeCommandUseErrorActionPreference defaulting $true under
# $ErrorActionPreference='Stop', a non-zero `git` exit threw instead of letting the
# hook's $LASTEXITCODE/fallback guards run, crashing the Stop event on a non-git
# dir, detached HEAD, or unborn branch. The non-fatal git probes now opt out of the
# throw (try/catch, mirroring the .sh twin's `||`/`if` guards); the snapshot-creating
# calls still throw so a real write failure aborts loudly. Restores .sh/.ps1 robustness
# parity; .sh + Claude Code behavior unchanged.
version: 0.1.2
