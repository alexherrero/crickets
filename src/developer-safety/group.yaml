name: Developer Safety
description: Universal control + safety layer — kill-switch, steer, commit-on-stop hooks plus commit-no-coauthor / worktrees-operator-initiated conventions. Usable in any session; enhances developer-workflows (its hooks engage across the phase loop) when both are installed.
category: Coding
requires: []
standalone: true
enhances: [development-lifecycle]
capabilities: [recoverability]
# Per-plugin marketplace version. Bump on every release that ships new/changed
# primitives so `claude plugin update developer-safety@crickets` actually pulls
# them (the marketplace entry compares this value; a static version no-ops the
# update). 0.1.1 = the first bump past the original 0.1.0 — ports the host-portable
# workspace resolution from the .sh hooks to their .ps1 twins (kill-switch, steer,
# commit-on-stop), so the operator-control hooks read the real workspace root on
# Antigravity/Windows (cwd = plugin dir, workspace on stdin) instead of doing inert
# cwd-relative .harness/ checks. Restores .sh/.ps1 parity; .sh + Claude Code behavior
# unchanged. 0.1.2 = hardens commit-on-stop.ps1 against the pwsh-7.4 native-command
# throw: with $PSNativeCommandUseErrorActionPreference defaulting $true under
# $ErrorActionPreference='Stop', a non-zero `git` exit threw instead of letting the
# hook's $LASTEXITCODE/fallback guards run, crashing the Stop event on a non-git
# dir, detached HEAD, or unborn branch. The non-fatal git probes now opt out of the
# throw (try/catch, mirroring the .sh twin's `||`/`if` guards); the snapshot-creating
# calls still throw so a real write failure aborts loudly. Restores .sh/.ps1 robustness
# parity; .sh + Claude Code behavior unchanged.
# 0.2.0 = retires the `worktrees-never-auto` snippet in favor of
# `worktrees-operator-initiated` (V5-10 sibling #2; ADR 0022). The blanket
# "never create worktrees" prohibition became wrong once `/spawn-worker` made
# operator-initiated worker worktrees a first-class coordinator workflow. The new
# snippet keeps the load-bearing guarantee (no *autonomous* worktree creation) while
# affirming that an operator-initiated worktree — `/spawn-worker`, or an explicit
# request — is expected, not an exception. Snippet file + `name:` renamed to stay
# matched; behavior for a session with no operator worktree request is unchanged.
# 0.3.1 = declare capabilities: [recoverability] (AG Phase-2 capability-declaration hygiene).
# 0.3.3 = commit-no-coauthor and worktrees-operator-initiated corrected
# supported_hosts to [antigravity] only (R2.1 / cricketsBuild#1's kind×host
# expressibility lint caught both claiming claude-code for kind: snippet,
# which emit_claude.py has always dropped ("Claude has no instruction-file
# primitive"). Claude Code users of this plugin never received this content;
# this stops the false claim, it does not add a new emission path.
# 0.3.4 = new scripts/recoverability_classifier.py — the mechanical subset of
# the recoverability doctrine (ref-delete reachability, tag-publication
# status, fast-forward-vs-history-rewrite push classification); returns
# NEEDS_JUDGMENT rather than guessing for anything git can't resolve on its
# own (PLAN-r2-enforcement-and-sync task 4).
# 0.3.5 = steer migrated PreToolUse -> UserPromptSubmit + additionalContext
# JSON (R2.2 task 5 live-verify: PreToolUse stdout injection was never
# actually true). Real behavior change: guidance now surfaces on the next
# submitted prompt, not the next tool call; no longer fires on Antigravity
# at all (no UserPromptSubmit equivalent there).
# 0.3.6 = AG Wave A rename 1: enhances: [developer-workflows] -> [development-lifecycle].
version: 0.3.6
