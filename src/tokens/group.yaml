name: Tokens
description: Deterministic transcript-JSONL cost analyzer — per-message cost curve, 5h rolling window, floor breakdown, and cache-read vs cache-write vs fresh-input split. Prerequisite for Part C (status-line meter) and Part G (heat-based floor).
category: Coding
requires: []
standalone: true
# Per-plugin marketplace version. Bump on every release that ships new/changed
# primitives so `claude plugin update token-audit@crickets` actually pulls them.
# 0.1.0 = initial plugin: pricing.py (one pricing table, reusable by Part C) +
# analyzer.py (streaming JSONL reader, per-message cost, 5h rolling window,
# floor breakdown, cache split with "% served from cache") + /token-audit command
# (headline + per-message table + window sums + floor, --by-phase flag for phase
# attribution from /plan|/work|/review|/release|/bugfix markers). Schema verified
# 2026-06-14 against real Claude Code 1.x JSONL: input_tokens /
# cache_creation_input_tokens / cache_read_input_tokens / output_tokens all present;
# cache_creation.ephemeral_5m_input_tokens and ephemeral_1h_input_tokens tracked
# but priced at the same rate (TODO: distinguish when Part C needs it).
# 0.1.1 = R0.7 repairs (Mythos readiness audit, 2026-07-01/02): pricing.py
# re-pinned against the 2026-07-03 Anthropic pricing page — adds claude-fable-5
# and claude-sonnet-5 rows (a pure fable-5 session priced at $0 before this);
# analyzer.py's --by-phase attribution now matches the real
# <command-name>/cmd</command-name> XML Claude Code encodes slash commands as,
# with the raw '/cmd'-prefix match kept as a fallback for non-Claude-Code hosts
# (the old startswith('/cmd') check never fired against a real transcript);
# the phase-attribution test fixture is a literal real transcript snippet, not
# a synthesized approximation.
# 0.2.0 = PLAN-efficiency-automation (2026-07-04): the automation layer the
# token-audit design's 2026-07-04 amendment specifies — routing_table.py (the
# versioned work-type -> (tier, model_id, effort) table, parity-guarded
# against pricing.py's PRICING keys) + classify_work_type.py (the three-step
# resolver: persona-declared -> role-name match -> UNCLASSIFIED-DEFAULT) land
# first; the fan-out cost gate, /handoff-pack, and the routing-conformance
# report land as later tasks in the same plan/version.
# 0.2.1 = PLAN-efficiency-automation task 7: /handoff-pack command +
# handoff_pack.py — generalizes the Mythos PROMPTS.md pattern; snapshots a
# session's outputs into a handoff directory alongside paste-ready prompts,
# each carrying a machine-readable {tier, model_id, effort} label (a
# structured field in prompts.json, not a prose annotation) per the shared
# fixture schema PLAN-efficiency-dispatch's escalation tripwire is expected
# to conform to.
# 0.2.2 = PLAN-efficiency-automation task 8: routing_conformance.py + a new
# /token-audit --routing section. Classifies model-used vs. work-type
# against routing_table.py, counting no-announcement dispatches as
# violations regardless of what the expected model would have been.
# Provisional: the mandatory fan-out announcement line it reads is
# PLAN-efficiency-dispatch's [PENDING-IMPL] scope, so this operates on a
# structured DispatchRecord list (or --routing-fixture JSON) rather than a
# regex over an announcement format that doesn't exist yet.
# 0.2.3 = PLAN-efficiency-dispatch task 1 (rescoped after Task 0's negative
# frontmatter-pin finding): ROLE_TO_WORK_TYPE gains the seven phase-command
# names (plan/review/design/spec/interview-me -> author-transcription-shaped;
# work/bugfix -> worker-build), so classify_work_type is the single source
# for command routing nudges too, not just sub-agent dispatch roles.
# 0.2.4 = PLAN-efficiency-dispatch task 2 (rescoped): agent_tool_alias() +
# MODEL_ID_TO_AGENT_ALIAS map a routing_table.py model id to the Agent
# tool's model param enum (sonnet/opus/haiku/fable) — never opusplan, which
# is a session-level construct with no per-dispatch meaning. Adds
# "evaluator" to ROLE_TO_WORK_TYPE (crickets' own verification-clerk-style
# grader). Wires the explorer (work.md, bugfix.md), adversarial +
# cross-model reviewer (review.md), and documenter (plan.md, work.md)
# dispatch sites to resolve + pass the alias, capability-gated,
# graceful-skip to today's unrouted behavior when token-audit is absent.
# 0.2.5 = PLAN-efficiency-dispatch task 6: classify_work_type.render_tier_hint()
# renders a staged-plan task's optional tier-hint line from a declared
# work-type. /plan's template + authoring instructions (developer-workflows)
# reference it — this side just ships the render function.
# 0.2.6 = routing_conformance.py's P12 addendum: an INHERITED tier_source now
# counts in its own inherited_or_default bucket, never guessed as a
# match/mismatch/violation, with the host->=2.1.198 re-audit trigger named
# explicitly in the report output (R2.5 task 9).
# 0.3.0 = AG Wave A rename 2 (PLAN-wave-a-renames-2 task 6): folds
#          status-line-meter in — status_line_meter.py moves into this
#          group's own scripts/; its standalone enhances: edge onto
#          token-audit dissolves (no longer a cross-plugin edge, since the
#          source plugin no longer exists). Then the directory renames
#          token-audit -> tokens. capabilities dualizes
#          [status-line-meter, token-audit, tokens] — all three names
#          keep resolving. Fold-then-rename in one task avoids a transient
#          state where tokens exists under the old name with the fold
#          half-done.
version: 0.3.0
capabilities: [status-line-meter, token-audit, tokens]
