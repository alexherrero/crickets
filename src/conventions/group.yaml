name: Conventions
description: Day-to-day testing + release discipline in one plugin — tests-are-sacred, verification-first, the 3-layer pyramid, the pre-release checklist, changelog-shape, and paired-release coordination for cross-repo releases.
category: Coding
requires: [development-lifecycle]
standalone: false
capabilities: [testing-conventions, releasing-conventions, conventions]
# 0.1.0 = AG Wave A rename 2 (PLAN-wave-a-renames-2 task 5): testing-conventions
#          + releasing-conventions merge into this group per crickets-conventions.md's
#          Migrations spec — a flat merge (neither source had scripts/, only
#          rules/ + skills/, one file each). capabilities dualizes both
#          transitional self-names alongside the merged conventions noun. The
#          four pre-existing primitives (no-skip-tests.md, version-bump-required.md,
#          the testing-conventions skill, the ship-release skill) are unchanged.
#          "Migrate the homeless conventions in" (agentic-engineering/ci-battery/
#          no-change-detector rules from AGENTS.md) is descoped to a Wave-C
#          follow-up per the plan's own locked design call — this task is the
#          rename mechanic only.
# 0.2.0 = PLAN-wave-c-design-and-conventions task 4: the homeless-domain
#          migration lands. New skills/agentic-engineering/SKILL.md (the
#          harness discipline, migrated verbatim from agentm's AGENTS.md +
#          harness/principles.md + the operator's global ~/.claude/CLAUDE.md)
#          and rules/ci-battery.md (the gate-battery standard, migrated from
#          agentm AGENTS.md's "Running the checks" section, generalized off
#          agentm's own project-specific gate list). New scripts/
#          conventions_domain.py resolves a domain name to its on-disk
#          rules/skills/reference shape (graceful on an unknown domain).
#          no-change-detector is NOT included here -- it's code-quality's
#          domain per crickets-conventions.md's own table, not this task's.
# 0.3.0 = PLAN-wave-c-design-and-conventions task 5: the documentation domain
#          (rules/documentation.md, citing check-wiki.py's single-mode-per-
#          page + length-ceiling + naming-uniqueness rules) and the new
#          reference/ shape (gate-inventory.md, features-json-schema.md --
#          objective house facts, cited not gated). reference/ is now a
#          recognized group-level asset dir (like scripts/templates/) in
#          scripts/src_model.py + both emitters, so it actually ships in
#          dist/, not just the source tree.
# 0.4.0 = PLAN-wave-c-design-and-conventions task 6: the Phase-2 conformance
#          gate (scripts/check_conventions_conformance.py), wired into
#          check-all.sh + tests-linux.yml. Checks declaration, not content:
#          a plugin marking <!-- consults-conventions-domain: X --> in a
#          command/skill must declare conventions in requires:/enhances:.
# 0.5.0 = Consolidation arc, CONS-8 (process codification), item 1: new
#          rules/coalescence-gate.md -- the arc-exit close-out checklist
#          (ruling 8) that development-lifecycle's release.md constraint 9
#          points at. Documents the seven required items and the D4
#          dark-registry + orphan-census reconciliation it depends on.
# 0.6.0 = Consolidation arc, CONS-8, item 2: new rules/coordinator-dispatch.md
#          -- the "any multi-session job is authored as one coordinator
#          dispatch" default (rubric 10), naming the CONS-COORD shape
#          (dispatch-only coordinator, verbatim briefs, completion log,
#          escalate ledger, re-dispatch-once) and src/tokens/scripts/
#          fanout_cost_gate.py as the fleet pre-flight this convention wires
#          in -- documented + named as this script's first real caller, not
#          yet wired as a live call site (noted explicitly as a follow-up,
#          not blocking this rule's authoring). skills/agentic-engineering/
#          SKILL.md's fan-out section gains a one-line pointer at the new
#          rule for discoverability.
# 0.7.0 = Consolidation arc, CONS-8, item 3: new rules/release-cadence.md --
#          a finished plan that changes behavior cuts a release (no more
#          bundling), plus the commit-subject vocabulary standard (stranger-
#          readable, conventional prefix kept, roadmap id where one applies,
#          internal codenames banned from subjects). ship-release SKILL.md
#          gains checklist item 8 pointing at the new rule (v0.2.1 -> v0.2.2).
# 0.8.0 = Consolidation arc, CONS-8, item 4: new rules/dark-registry.md --
#          reconciles CONS-1's agentm JSONL (scripts/health/dark-checks.jsonl,
#          a real health-scorecard input) against CONS-2's crickets markdown
#          table (wiki/explanation/Repo-Layout.md). Decision: keep both
#          repo-local formats -- the shared convention is the four-field
#          registration + arc-exit reconciliation discipline, not one file
#          format; crickets has no scorecard consumer to justify a JSONL
#          file nobody reads. Repo-Layout.md's dark-registry section now
#          points at this rule as the canonical convention definition.
# 0.8.1 = Consolidation arc, CONS-8, item 5: skills/agentic-engineering/
#          SKILL.md's "The .harness/PLAN.md shape" archive-path example
#          fixed from a flat `PLAN.archive.YYYYMMDD-<slug>.md` to
#          `archive/PLAN.archive.YYYYMMDD-<slug>.md` (ruling 6), matching
#          the same fix in development-lifecycle's release.md.
# 0.8.2 = Consolidation arc, Wave 4 proving window, scenario (d): rules/
#          coordinator-dispatch.md's "Status as of this rule's authoring"
#          paragraph for fanout_cost_gate.py updated from "documented, not
#          yet wired" to "wired and live" -- the gate now has a real caller
#          (development-lifecycle's fanout_announcement.py), reconciling the
#          dark item this rule named as a follow-up at its own authoring.
# 0.9.0 = new scripts/coalescence_checks.py mechanizes a narrow slice of
#          three of the coalescence-gate rule's seven close-out items
#          (narrative row / shipping-item board state / archive hygiene) as
#          a cheap file-read or `gh` API assertion apiece -- ship-release's
#          mechanical workflow gains precondition 6, which aborts the cut
#          with a specific message on a failure. Closes the gap where a
#          release could complete without ever having run the checklist it
#          claims to follow. coalescence-gate.md documents the machine-
#          checked slice per item without overclaiming the parts that still
#          need a human read (the whole arc's narrative rows, the whole
#          board's plain-English pass). ship-release SKILL.md 0.2.2 -> 0.3.0;
#          coalescence-gate.md 0.1.0 -> 0.2.0.
version: 0.9.0
