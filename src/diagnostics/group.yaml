name: Diagnostics
description: Deterministic-first failure diagnosis. /diagnose classifies a failure, recalls it via a fingerprint-first exact-match ladder (semantic fallback only on a miss), ranks hypotheses, and writes one scrubbed kind:failure-incident memory entry.
category: Coding
requires: [development-lifecycle]
standalone: false
# 0.1.0 = initial build (wave-c-diagnostics): fingerprint normalizer, the
#          three-layer recall ladder (classify -> Layer-1 exact match ->
#          Layer-2 semantic fallback), the self-reinforcing fingerprint
#          alias mechanism, the scrubbed failure-incident writer, and the
#          /diagnose command wiring all five together end to end.
# 0.1.1 = writer.py's _build_body() now requests the how-we-engineer opinion
#          by name (opinion_resolve, via a new agentm_bridge.py path-fallback
#          to agentm's top-level scripts/), folding the resolved text into a
#          written incident's ## Opinion: how-we-engineer section
#          (PLAN-wave-d-opinion-wiring task 1).
version: 0.1.1
capabilities: [diagnostics]
