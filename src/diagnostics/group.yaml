name: Diagnostics
description: Deterministic-first failure diagnosis. /diagnose classifies a failure, recalls it via a fingerprint-first exact-match ladder (semantic fallback only on a miss), ranks hypotheses, and writes one scrubbed kind:failure-incident memory entry.
category: Coding
requires: [development-lifecycle]
standalone: false
enhances:
  - group: maintenance
    capability: ci-repair
    effect: "dependabot-fixer's Diagnose step calls diagnose() instead of reasoning fresh every time, with a confidence-gate proxy over the outcome field standing in for /diagnose's absent confidence score"
# 0.1.0 = initial build (wave-c-diagnostics): fingerprint normalizer, the
#          three-layer recall ladder (classify -> Layer-1 exact match ->
#          Layer-2 semantic fallback), the self-reinforcing fingerprint
#          alias mechanism, the scrubbed failure-incident writer, and the
#          /diagnose command wiring all five together end to end.
# 0.1.1 = writer.py's _build_body() now requests the how-we-engineer opinion
#          by name (opinion_resolve, via a new agentm_bridge.py path-fallback
#          to agentm's top-level scripts/), folding the resolved text into a
#          written incident's ## Opinion: how-we-engineer section
#          (PLAN-wave-d-opinion-wiring task 1).
# 0.1.2 = PLAN-wave-d-tokens-and-privacy task 6: write_failure_incident() now
#          explicitly scrubs the assembled body via privacy's new
#          scrub_text() surface before handing it to agentm_bridge -- a
#          second, explicit, visible scrub at the crickets call site,
#          alongside (not instead of) save_entry()'s own mandatory
#          kind-gated scrub. Graceful-skip (falls back to the implicit-only
#          scrub) when privacy's scrub_text.py isn't co-located.
# 0.1.3 = PLAN-wave-d-cross-wiring task 1: declares the enhances: edge onto
#          maintenance's ci-repair capability -- dependabot-fixer's Diagnose
#          step now calls this engine instead of reasoning inline. No change
#          to diagnose.py itself; only the group.yaml dependency graph gains
#          the edge the design doc already documented as composed by
#          maintenance.
# 0.1.4 = PLAN-wave-d-cross-wiring task 2: /bugfix's Analyze phase now seeds
#          a starting hypothesis set from this engine (bugfix.md's own
#          change). No group.yaml enhances: edge is added for this one --
#          diagnostics already `requires: [development-lifecycle]`, and
#          lint_src.py rejects enhances: onto a group already in requires:
#          (that's a hard dependency, not an optional enhancement). The
#          relationship is documented in bugfix.md and this comment instead.
#          diagnose.py itself is untouched.
version: 0.1.4
capabilities: [diagnostics]
