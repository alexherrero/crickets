name: Design
description: Design-doc and ADR authoring — the /design command (author → translate → sequence) and the ADR skill for capturing architectural decisions with re-audit triggers.
category: Coding
requires: [development-lifecycle]
standalone: false
capabilities: [design-docs, design, architecture]
# 0.1.1 = declare capabilities: [design] (AG Phase-2 capability-declaration hygiene).
# 0.1.3 = AG Wave A rename 1: requires: [developer-workflows] -> [development-lifecycle]
#          (the group's directory renamed; both capability names still resolve).
# 0.2.0 = AG Wave A rename 2 (PLAN-wave-a-renames-2 task 4): directory renamed
#          design-docs -> design; re-homed development-lifecycle's spec.md/
#          interview-me.md/document-decision.md commands + design_doc.py/
#          design_sequence.py/design-doc.md template into this plugin (they
#          were living in development-lifecycle only because /design predated
#          this plugin's split). De-duped the two /design command copies —
#          development-lifecycle's copy was the full implementation,
#          design-docs' was a thin delegate stub; the full copy now lives here
#          verbatim (self-referential prose repointed developer-workflows ->
#          development-lifecycle; stage_plan.py calls repointed cross-plugin
#          to development-lifecycle, a hard requires: dependency, since that
#          helper stays there). capabilities dualizes [design-docs, design]
#          alongside the existing architecture declare.
# 0.2.1 = fix(design_doc.py): the task-4 move broke `import resolve_plan` —
#          it was a same-directory import while design_doc.py lived in
#          development-lifecycle/scripts/; now a cross-plugin DC-2 violation.
#          Discovered live when PLAN-wave-a-repoints tried to activate and
#          stage_plan.py crashed with ModuleNotFoundError (design_doc.py is
#          on preflight_reconcile.py's import chain). Fixed with a
#          `_load_resolve_plan()` bridge that loads the sibling
#          development-lifecycle plugin's resolve_plan.py by file path
#          (mirrors resolve_plan.py's own `_load_bridge()` for
#          find_process_seam.py) instead of a plain `import`.
version: 0.2.1
