name: Design
description: Design-doc and ADR authoring — the /design command (author → translate → sequence) and the ADR skill for capturing architectural decisions with re-audit triggers.
category: Coding
requires: [development-lifecycle]
standalone: false
capabilities: [design-docs, design, architecture]
